{{- if .Values.rbac.create }}
{{- /*
  Namespaced Role + RoleBinding granting the fleetsweeper ServiceAccount
  permission to manage the coordination.k8s.io/v1 Lease used for leader
  election. The Role lives in the deployment namespace because Leases are
  namespaced and the election only needs to coordinate within this release.
*/}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fleetsweeper
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: [leases]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: [events]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fleetsweeper
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-leader
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
