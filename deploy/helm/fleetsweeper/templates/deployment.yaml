apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: fleetsweeper
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: fleetsweeper
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fleetsweeper
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: fleetsweeper
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          args:
            - serve
            - --addr=:8080
            {{- if eq .Values.database.driver "postgres" }}
            - --db-driver=postgres
            - --db=$(FLEETSWEEPER_DB_DSN)
            {{- else }}
            - --db=/data/fleet.db
            {{- end }}
            {{- if .Values.scheduler.interval }}
            - --scan-interval={{ .Values.scheduler.interval }}
            {{- end }}
            {{- if .Values.scheduler.allContexts }}
            - --all-contexts
            {{- end }}
            {{- range .Values.cors.origins }}
            - --cors-origin={{ . }}
            {{- end }}
            {{- if .Values.auth.insecure }}
            - --insecure
            {{- end }}
            {{- if .Values.controller.enabled }}
            - --controller
            - --controller-poll={{ .Values.controller.pollInterval }}
            {{- if .Values.controller.namespace }}
            - --controller-namespace={{ .Values.controller.namespace }}
            {{- end }}
            {{- end }}
            {{- if not .Values.leaderElection.enabled }}
            - --leader-election=false
            {{- else }}
            - --leader-name={{ .Values.leaderElection.name | default .Release.Name }}
            {{- end }}
            {{- if .Values.admission.enabled }}
            - --admission-addr=:8443
            - --admission-mode={{ .Values.admission.mode }}
            - --admission-dns={{ .Release.Name }}-admission.{{ .Release.Namespace }}.svc
            - --admission-dns={{ .Release.Name }}-admission.{{ .Release.Namespace }}.svc.cluster.local
            {{- end }}
            {{- if .Values.oidc.enabled }}
            - --oidc-issuer-url={{ .Values.oidc.issuerURL }}
            - --oidc-client-id={{ .Values.oidc.clientID }}
            - --oidc-client-secret=$(FLEETSWEEPER_OIDC_CLIENT_SECRET)
            - --oidc-redirect-url={{ .Values.oidc.redirectURL }}
            - --session-secret=$(FLEETSWEEPER_SESSION_SECRET)
            - --session-lifetime={{ .Values.oidc.sessionLifetime }}
            {{- range .Values.oidc.scopes }}
            - --oidc-scopes={{ . }}
            {{- end }}
            {{- if .Values.oidc.adminClaim }}
            - --oidc-admin-claim={{ .Values.oidc.adminClaim }}
            {{- end }}
            {{- if .Values.oidc.operatorClaim }}
            - --oidc-operator-claim={{ .Values.oidc.operatorClaim }}
            {{- end }}
            - --oidc-default-role={{ .Values.oidc.defaultRole }}
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if .Values.auth.token }}
            - name: FLEETSWEEPER_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-auth
                  key: token
            {{- end }}
            {{- if eq .Values.database.driver "postgres" }}
            - name: FLEETSWEEPER_DB_DSN
              {{- if .Values.database.postgres.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.postgres.existingSecret }}
                  key: {{ .Values.database.postgres.existingSecretKey }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-database
                  key: dsn
              {{- end }}
            {{- end }}
            {{- if .Values.oidc.enabled }}
            - name: FLEETSWEEPER_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if .Values.oidc.existingSecret }}
                  name: {{ .Values.oidc.existingSecret }}
                  key: client-secret
                  {{- else }}
                  name: {{ .Release.Name }}-oidc
                  key: client-secret
                  {{- end }}
            - name: FLEETSWEEPER_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  {{- if .Values.oidc.existingSecret }}
                  name: {{ .Values.oidc.existingSecret }}
                  key: session-secret
                  {{- else }}
                  name: {{ .Release.Name }}-oidc
                  key: session-secret
                  {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
            {{- if .Values.admission.enabled }}
            - name: webhook
              containerPort: 8443
            {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
