# krew (kubectl plugin manager) manifest for Fleetsweeper.
# Submit a PR to https://github.com/kubernetes-sigs/krew-index after each
# release that updates the version and SHA256 sums to point at the new
# GitHub release assets.
#
# Local install for testing:
#   kubectl krew install --manifest deploy/krew/plugin.yaml --archive <path>
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: fleetsweeper
spec:
  version: v0.1.0  # bump on every release
  homepage: https://github.com/dcadolph/fleetsweeper
  shortDescription: Cross-cluster Kubernetes drift detection
  description: |
    Fleetsweeper scans multiple Kubernetes clusters and flags drift across
    them using statistical baselines derived from the fleet itself. No
    rulebook required.

    After install, run `kubectl fleetsweeper serve --demo` to preview the
    dashboard, or apply a ClusterScan custom resource to scan continuously
    from inside a cluster.
  caveats: |
    Fleetsweeper writes its data to a SQLite file or PostgreSQL database.
    For the default --demo mode no persistence is required.
    For production: pass --db with a writable path or DSN.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.1.0/fleetsweeper_0.1.0_linux_x86_64.tar.gz
      sha256: b2b016fdb482ce43eea554c898749146fbdfc51eda666e24cc955c29ae1e51f4
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.1.0/fleetsweeper_0.1.0_linux_arm64.tar.gz
      sha256: f5038609bed5b6aa2e2d8f8077152fd8d1c4484615f12a01c654ab1672a4fea6
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.1.0/fleetsweeper_0.1.0_darwin_x86_64.tar.gz
      sha256: ff7885f542f8173753b093fee892201305e66947e2b897730332e28dfc3fe908
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.1.0/fleetsweeper_0.1.0_darwin_arm64.tar.gz
      sha256: 8e37567c50ae8883e9f6983cc03d90b0ad124ac88e7cd8e183faabd94b6d1dfa
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.1.0/fleetsweeper_0.1.0_windows_x86_64.zip
      sha256: e0d02492432ec1ccdb41855312193582dfc6af704fce8385920e4ea7cfea6dd9
      bin: fleetsweeper.exe
      files:
        - from: fleetsweeper.exe
          to: .
        - from: LICENSE
          to: .
