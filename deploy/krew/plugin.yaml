# krew (kubectl plugin manager) manifest for Fleetsweeper.
# Submit a PR to https://github.com/kubernetes-sigs/krew-index after each
# release that updates the version and SHA256 sums to point at the new
# GitHub release assets.
#
# Local install for testing:
#   kubectl krew install --manifest deploy/krew/plugin.yaml --archive <path>
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: fleetsweeper
spec:
  version: v0.1.1  # bump on every release
  homepage: https://github.com/dcadolph/fleetsweeper
  shortDescription: Cross-cluster Kubernetes drift detection
  description: |
    Fleetsweeper scans multiple Kubernetes clusters and flags drift across
    them using statistical baselines derived from the fleet itself. No
    rulebook required.

    After install, run `kubectl fleetsweeper serve --demo` to preview the
    dashboard, or apply a ClusterScan custom resource to scan continuously
    from inside a cluster.
  caveats: |
    Fleetsweeper writes its data to a SQLite file or PostgreSQL database.
    For the default --demo mode no persistence is required.
    For production: pass --db with a writable path or DSN.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.1.1/fleetsweeper_0.1.1_linux_x86_64.tar.gz
      sha256: 82e64988969881c237c5a206ce83a695e7aca54bb28801b2251f6a05f9647cc2
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.1.1/fleetsweeper_0.1.1_linux_arm64.tar.gz
      sha256: f636e86cfbbaaa6173e7506b7c36d8a696744d998d25705b91e83698266ed2db
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.1.1/fleetsweeper_0.1.1_darwin_x86_64.tar.gz
      sha256: 0cbea8539c50f245ef8a0ea052c8e409c2748bf3363f676a549dd00fd35ccf29
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.1.1/fleetsweeper_0.1.1_darwin_arm64.tar.gz
      sha256: 5d7036a23a265a7d7efed7c745ab769c39be54eda724df70a1c4855f0218aa5d
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.1.1/fleetsweeper_0.1.1_windows_x86_64.zip
      sha256: a6e403d19d48cf52d8c9d5866dd8094955b93ed20109348d55db9ff6397c194d
      bin: fleetsweeper.exe
      files:
        - from: fleetsweeper.exe
          to: .
        - from: LICENSE
          to: .
