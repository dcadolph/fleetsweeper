# krew (kubectl plugin manager) manifest for Fleetsweeper.
# Submit a PR to https://github.com/kubernetes-sigs/krew-index after each
# release that updates the version and SHA256 sums to point at the new
# GitHub release assets.
#
# Local install for testing:
#   kubectl krew install --manifest deploy/krew/plugin.yaml --archive <path>
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: fleetsweeper
spec:
  version: v0.3.0  # bump on every release
  homepage: https://github.com/dcadolph/fleetsweeper
  shortDescription: Cross-cluster Kubernetes drift detection
  description: |
    Fleetsweeper scans multiple Kubernetes clusters and flags drift across
    them using statistical baselines derived from the fleet itself. No
    rulebook required.

    After install, run `kubectl fleetsweeper serve --demo` to preview the
    dashboard, or apply a ClusterScan custom resource to scan continuously
    from inside a cluster.
  caveats: |
    Fleetsweeper writes its data to a SQLite file or PostgreSQL database.
    For the default --demo mode no persistence is required.
    For production: pass --db with a writable path or DSN.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.3.0/fleetsweeper_0.3.0_linux_x86_64.tar.gz
      sha256: 90626e2a24368c4a27b6e05ec663272a3c1da51d909808e7e47518fa98167a47
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.3.0/fleetsweeper_0.3.0_linux_arm64.tar.gz
      sha256: 8b2a2f050027bc1d426eee8db2790e06c23e4ad948654b14ca0bac8fd07529b6
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.3.0/fleetsweeper_0.3.0_darwin_x86_64.tar.gz
      sha256: c8ec0ca07ce00bce290a274541f242336b2991aedcb1c07d49d16db8d7ebbe40
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.3.0/fleetsweeper_0.3.0_darwin_arm64.tar.gz
      sha256: 3a80b2eef562b085feb69b00e56d0db6f32459f2369ea712113e366009134626
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.3.0/fleetsweeper_0.3.0_windows_x86_64.zip
      sha256: 7ce54e34fb6796486d0410722dc51190d6157fac83b2f4ce12ac7ba25557c23f
      bin: fleetsweeper.exe
      files:
        - from: fleetsweeper.exe
          to: .
        - from: LICENSE
          to: .
