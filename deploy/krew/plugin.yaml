# krew (kubectl plugin manager) manifest for Fleetsweeper.
# Submit a PR to https://github.com/kubernetes-sigs/krew-index after each
# release that updates the version and SHA256 sums to point at the new
# GitHub release assets.
#
# Local install for testing:
#   kubectl krew install --manifest deploy/krew/plugin.yaml --archive <path>
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: fleetsweeper
spec:
  version: v0.4.0  # bump on every release
  homepage: https://github.com/dcadolph/fleetsweeper
  shortDescription: Cross-cluster Kubernetes drift detection
  description: |
    Fleetsweeper scans multiple Kubernetes clusters and flags drift across
    them using statistical baselines derived from the fleet itself. No
    rulebook required.

    After install, run `kubectl fleetsweeper serve --demo` to preview the
    dashboard, or apply a ClusterScan custom resource to scan continuously
    from inside a cluster.
  caveats: |
    Fleetsweeper writes its data to a SQLite file or PostgreSQL database.
    For the default --demo mode no persistence is required.
    For production: pass --db with a writable path or DSN.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.4.0/fleetsweeper_0.4.0_linux_x86_64.tar.gz
      sha256: 76e7b19856aed20f0c1ea77603ccf9d38fd474664451874764445bb6416badb6
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.4.0/fleetsweeper_0.4.0_linux_arm64.tar.gz
      sha256: 961ab190c6df3c5cc82e900c3a7c8d94c96a441e5390c568c1b0c5afcd49cabc
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.4.0/fleetsweeper_0.4.0_darwin_x86_64.tar.gz
      sha256: df2f549d68f966779fb9166b82644105de76ce31267600292903cf9a380d0c32
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.4.0/fleetsweeper_0.4.0_darwin_arm64.tar.gz
      sha256: 25286a27c2254ebaeca4e2c80e4929660d702905284c6a5def9db8b634b07d89
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.4.0/fleetsweeper_0.4.0_windows_x86_64.zip
      sha256: 43a33399b3e325eaac93178786c2b9d9c6dcac7a062c0a6fd8b32942f0197442
      bin: fleetsweeper.exe
      files:
        - from: fleetsweeper.exe
          to: .
        - from: LICENSE
          to: .
