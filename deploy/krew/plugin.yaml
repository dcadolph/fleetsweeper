# krew (kubectl plugin manager) manifest for Fleetsweeper.
# Submit a PR to https://github.com/kubernetes-sigs/krew-index after each
# release that updates the version and SHA256 sums to point at the new
# GitHub release assets.
#
# Local install for testing:
#   kubectl krew install --manifest deploy/krew/plugin.yaml --archive <path>
apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: fleetsweeper
spec:
  version: v0.8.1  # bump on every release
  homepage: https://github.com/dcadolph/fleetsweeper
  shortDescription: Cross-cluster Kubernetes drift detection
  description: |
    Fleetsweeper scans multiple Kubernetes clusters and flags drift across
    them using statistical baselines derived from the fleet itself. No
    rulebook required.

    After install, run `kubectl fleetsweeper serve --demo` to preview the
    dashboard, or apply a ClusterScan custom resource to scan continuously
    from inside a cluster.
  caveats: |
    Fleetsweeper writes its data to a SQLite file or PostgreSQL database.
    For the default --demo mode no persistence is required.
    For production: pass --db with a writable path or DSN.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.8.1/fleetsweeper_0.8.1_linux_x86_64.tar.gz
      sha256: c81f29c9a0a0701ba45122ac495bd7ba4b0d8f6f65ea96133a76b67ddbab8d5b
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.8.1/fleetsweeper_0.8.1_linux_arm64.tar.gz
      sha256: d9a009ff1bcf8964ac7ba147003d670fbf98172cd24c1a325e429e2cc8cdeaa2
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.8.1/fleetsweeper_0.8.1_darwin_x86_64.tar.gz
      sha256: 30d5e60a8ee4579be3798e5a0aaefa1557553ca915f45589af050118f328e687
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: darwin
          arch: arm64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.8.1/fleetsweeper_0.8.1_darwin_arm64.tar.gz
      sha256: e90da88f3262309f21be141b58950756b326431d561837ca815b4e5056c28006
      bin: fleetsweeper
      files:
        - from: fleetsweeper
          to: .
        - from: LICENSE
          to: .
    - selector:
        matchLabels:
          os: windows
          arch: amd64
      uri: https://github.com/dcadolph/fleetsweeper/releases/download/v0.8.1/fleetsweeper_0.8.1_windows_x86_64.zip
      sha256: 4dfae56701220af60f22777123a70338b7db7eccf3c0eecb89c7839736fdee7d
      bin: fleetsweeper.exe
      files:
        - from: fleetsweeper.exe
          to: .
        - from: LICENSE
          to: .
