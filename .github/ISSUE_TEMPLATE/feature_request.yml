name: Feature request
description: Propose a new capability or improvement.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Tell us about the problem first. A clear problem statement usually
        leads to a better solution than a pre-baked design.
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve
      description: Describe the scenario or pain point in plain language.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would Fleetsweeper ideally behave? Sketches and example output are welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one is preferable.
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - New scanner
        - New finding / severity rule
        - New API endpoint
        - Dashboard / UI enhancement
        - CLI ergonomics
        - Integration (Slack, PagerDuty, OTel, Grafana, ArgoCD, Flux, OPA)
        - Deploy / Helm / RBAC
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and Discussions for similar proposals.
          required: true
