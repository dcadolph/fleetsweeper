name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needs to be run on:"
            echo "$unformatted"
            exit 1
          fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -short ./...

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true
      - run: go test -tags=integration -timeout=15m ./internal/integration/
