# Example workflow demonstrating the Fleetsweeper composite action.
# Rename this file to fleetsweeper-scan.yml in your own repo to enable it.

name: Fleet drift check (example)

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Render your kubeconfig from a secret. Example assumes the secret
      # holds a base64-encoded kubeconfig file with multiple contexts.
      - name: Stage kubeconfig
        run: |
          mkdir -p "${HOME}/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"

      - name: Scan the fleet
        id: scan
        uses: dcadolph/fleetsweeper/.github/actions/scan@main
        with:
          all-contexts: "true"
          fail-on: "critical"
          output: "html"
          output-file: fleetsweeper-report.html

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fleetsweeper-report
          path: ${{ steps.scan.outputs.report-path }}
          retention-days: 14

      - name: Print Fleet Score
        if: always()
        run: |
          echo "Fleet Score: ${{ steps.scan.outputs.fleet-score }}"
          echo "Critical: ${{ steps.scan.outputs.critical-count }}"
          echo "Warning: ${{ steps.scan.outputs.warning-count }}"
