name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # id-token lets cosign mint a short-lived Fulcio certificate from the
  # workflow's OIDC identity for keyless signing; attestations lets the build
  # publish SLSA provenance for the released artifacts.
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: anchore/sbom-action/download-syft@v0
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          # Container images are deferred (ghcr publishing not set up yet), so
          # docker is skipped; the checksums are cosign-signed keyless via the
          # workflow OIDC identity.
          args: release --clean --skip=docker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
