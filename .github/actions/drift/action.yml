name: Fleetsweeper drift
description: |
  Run `fleetsweeper drift` against a kubeconfig context and fail the
  workflow when any pod deviates from the admission baseline. The
  intended usage is a pre-flight CI gate: deploy to a staging cluster,
  then run this action before promoting to prod.
author: dcadolph
branding:
  icon: shield
  color: blue

inputs:
  kubeconfig:
    description: Path to the kubeconfig. Defaults to $KUBECONFIG when empty.
    required: false
    default: ""
  context:
    description: Kubeconfig context to inspect. Defaults to current-context.
    required: false
    default: ""
  namespace:
    description: Restrict the audit to a single namespace. Empty audits the whole cluster.
    required: false
    default: ""
  baseline:
    description: |
      Path to a pinned baseline YAML produced by `fleetsweeper baseline
      export`. When empty the action derives the baseline from --db.
    required: false
    default: ""
  db:
    description: |
      Database DSN. Required when baseline is empty (used to derive the
      baseline from the most recent stored scan).
    required: false
    default: ""
  fail-on-drift:
    description: Fail the job when any pod drifts. Set to "false" for advisory mode.
    required: false
    default: "true"
  fleetsweeper-version:
    description: Fleetsweeper release tag to install. "latest" pulls the most recent release.
    required: false
    default: "latest"

outputs:
  drifted-pods:
    description: Number of pods that drifted from the fleet norm.
    value: ${{ steps.drift.outputs.drifted-pods }}
  total-pods:
    description: Number of pods inspected.
    value: ${{ steps.drift.outputs.total-pods }}
  report-path:
    description: Path to the JSON report.
    value: ${{ steps.drift.outputs.report-path }}

runs:
  using: composite
  steps:
    - name: Install Fleetsweeper
      shell: bash
      env:
        VERSION: ${{ inputs.fleetsweeper-version }}
      run: |
        set -euo pipefail
        if command -v fleetsweeper >/dev/null 2>&1; then
          echo "Fleetsweeper already on PATH: $(fleetsweeper version 2>/dev/null || true)"
          exit 0
        fi
        bin_dir="${HOME}/.fleetsweeper/bin"
        mkdir -p "${bin_dir}"
        if [[ "${VERSION}" == "latest" ]]; then
          api_url="https://api.github.com/repos/dcadolph/fleetsweeper/releases/latest"
        else
          api_url="https://api.github.com/repos/dcadolph/fleetsweeper/releases/tags/${VERSION}"
        fi
        download_url=$(curl -sSL -H "Accept: application/vnd.github+json" "${api_url}" |
          grep -oE "https://[^\"]+fleetsweeper_.*_linux_x86_64.tar.gz" | head -n1)
        if [[ -z "${download_url}" ]]; then
          echo "::error::Could not find Fleetsweeper release asset"
          exit 1
        fi
        curl -sSL "${download_url}" | tar -xz -C "${bin_dir}" fleetsweeper
        chmod +x "${bin_dir}/fleetsweeper"
        echo "${bin_dir}" >> "${GITHUB_PATH}"

    - name: Run Fleetsweeper drift
      id: drift
      shell: bash
      env:
        KUBECONFIG_INPUT: ${{ inputs.kubeconfig }}
        CONTEXT: ${{ inputs.context }}
        NAMESPACE: ${{ inputs.namespace }}
        BASELINE: ${{ inputs.baseline }}
        DB: ${{ inputs.db }}
        FAIL_ON_DRIFT: ${{ inputs.fail-on-drift }}
      run: |
        set -euo pipefail
        if [[ -z "${BASELINE}" && -z "${DB}" ]]; then
          echo "::error::Either baseline or db must be set."
          exit 2
        fi
        report_path="$(mktemp -t fleetsweeper-drift.XXXXXX).json"
        args=("drift" "--json")
        if [[ -n "${KUBECONFIG_INPUT}" ]]; then args+=("--kubeconfig" "${KUBECONFIG_INPUT}"); fi
        if [[ -n "${CONTEXT}" ]]; then args+=("--context" "${CONTEXT}"); fi
        if [[ -n "${NAMESPACE}" ]]; then args+=("--namespace" "${NAMESPACE}"); fi
        if [[ -n "${BASELINE}" ]]; then args+=("--baseline" "${BASELINE}"); fi
        if [[ -n "${DB}" ]]; then args+=("--db" "${DB}"); fi
        if [[ "${FAIL_ON_DRIFT}" == "true" ]]; then args+=("--fail-on-drift"); fi
        exit_code=0
        fleetsweeper "${args[@]}" > "${report_path}" || exit_code=$?
        if command -v jq >/dev/null 2>&1; then
          drifted=$(jq -r '.drifted_pods // 0' "${report_path}")
          total=$(jq -r '.total_pods // 0' "${report_path}")
        else
          drifted=$(grep -oE '"drifted_pods"[[:space:]]*:[[:space:]]*[0-9]+' "${report_path}" | grep -oE '[0-9]+$' | head -n1)
          total=$(grep -oE '"total_pods"[[:space:]]*:[[:space:]]*[0-9]+' "${report_path}" | grep -oE '[0-9]+$' | head -n1)
        fi
        echo "drifted-pods=${drifted:-0}" >> "${GITHUB_OUTPUT}"
        echo "total-pods=${total:-0}" >> "${GITHUB_OUTPUT}"
        echo "report-path=${report_path}" >> "${GITHUB_OUTPUT}"
        {
          echo "## Fleetsweeper drift"
          echo ""
          echo "| Metric | Value |"
          echo "| ------ | ----- |"
          echo "| Pods inspected | ${total:-0} |"
          echo "| Pods drifted   | ${drifted:-0} |"
        } >> "${GITHUB_STEP_SUMMARY}"
        if [[ "${exit_code}" -ne 0 && "${FAIL_ON_DRIFT}" == "true" ]]; then
          exit "${exit_code}"
        fi
