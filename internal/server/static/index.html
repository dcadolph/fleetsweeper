// replayWire binds the slider, play/pause, and chart for the drift replay view.
// Autoplay respects reduced-motion and pauses when the tab is hidden or the
// chart scrolls out of view; the cleanup is registered on P so navigation stops
// the timer and detaches listeners.
function replayWire(pts,sets,pers,idx){
  var slider=document.getElementById('replaySlider');
  var stamp=document.getElementById('replayStamp');
  var playBtn=document.getElementById('replayPlay');
  var idxLabel=document.getElementById('replayIdxLabel');
  var cur=idx;
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var chart=makeChart('replayChart',{
    type:'line',
    data:{labels:pts.map(function(_,i){return i+1;}),datasets:[
      {label:'Total',data:pts.map(function(p){return p.total;}),borderColor:'#58a6ff',backgroundColor:'rgba(88,166,255,.12)',fill:true,tension:.3,pointRadius:markRadius(pts,cur)},
      {label:'Critical',data:pts.map(function(p){return p.critical;}),borderColor:'#f85149',backgroundColor:'rgba(248,81,73,.10)',fill:true,tension:.3,pointRadius:markRadius(pts,cur)}
    ]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{labels:{boxWidth:10,color:'#8b949e'}}},scales:{x:{ticks:{color:'#8b949e'},grid:{color:'rgba(139,148,158,.08)'}},y:{beginAtZero:true,ticks:{color:'#8b949e',precision:0},grid:{color:'rgba(139,148,158,.08)'}}}}
  });

  renderChronic(pers);

  function paint(){
    var p=pts[cur];
    if(stamp)stamp.textContent='Scan '+(cur+1)+' of '+pts.length+' · '+new Date(p.timestamp).toLocaleString();
    if(idxLabel)idxLabel.textContent='· '+p.total+' findings';
    var prev=cur>0?sets[cur-1]:{};
    var now=sets[cur];
    var appeared=0,resolved=0;
    Object.keys(now).forEach(function(fp){if(!prev[fp])appeared++;});
    Object.keys(prev).forEach(function(fp){if(!now[fp])resolved++;});
    document.getElementById('replaySummary').innerHTML=
      replayChip('Total',p.total,'var(--tx)')+replayChip('Critical',p.critical,'var(--cr)')
      +replayChip('Warning',p.warning,'var(--wn)')+replayChip('Info',p.info,'var(--ac)')
      +replayChip('Appeared','+'+appeared,'var(--ok)')+replayChip('Resolved','-'+resolved,'var(--t3)');
    var items=Object.keys(now).map(function(fp){return now[fp];});
    items.sort(function(a,b){return replaySev(a.severity)-replaySev(b.severity);});
    var out=items.length?items.map(function(f){return replayRow(f,prev[f.fingerprint]?'':'new');}).join(''):'<div class="empty" style="padding:14px">No findings at this point.</div>';
    var res=Object.keys(prev).filter(function(fp){return !now[fp];}).map(function(fp){return prev[fp];});
    if(res.length){out+='<div style="font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);margin:10px 0 4px">Resolved since previous scan</div>'+res.map(function(f){return replayRow(f,'resolved');}).join('');}
    document.getElementById('replayFindings').innerHTML=out;
    if(chart){chart.data.datasets[0].pointRadius=markRadius(pts,cur);chart.data.datasets[1].pointRadius=markRadius(pts,cur);chart.update('none');}
    if(slider)slider.value=cur;
  }

  var timer=null;
  function stop(){if(timer){clearInterval(timer);timer=null;}if(playBtn){playBtn.textContent='Play';playBtn.classList.remove('on');}}
  function start(){
    if(reduce)return;
    if(cur>=pts.length-1)cur=0;
    playBtn.textContent='Pause';playBtn.classList.add('on');
    timer=setInterval(function(){if(cur>=pts.length-1){stop();return;}cur++;paint();},900);
  }
  if(slider)slider.addEventListener('input',function(){cur=parseInt(slider.value,10)||0;stop();paint();});
  if(playBtn)playBtn.addEventListener('click',function(){if(timer)stop();else start();});
  if(reduce&&playBtn){playBtn.disabled=true;playBtn.style.opacity='.5';playBtn.title='Autoplay disabled by your reduced-motion preference';}

  function onVis(){if(document.hidden)stop();}
  document.addEventListener('visibilitychange',onVis);
  var io=null;
  if(window.IntersectionObserver){io=new IntersectionObserver(function(es){es.forEach(function(e){if(!e.isIntersecting)stop();});});var cv=document.getElementById('replayChart');if(cv)io.observe(cv);}
  P.replayStop=function(){stop();document.removeEventListener('visibilitychange',onVis);if(io)io.disconnect();P.replayStop=null;};

  paint();
}

// markRadius enlarges the plotted point at the current scrub index.
function markRadius(pts,cur){return pts.map(function(_,i){return i===cur?5:2;});}

// replaySev ranks severities critical-first for stable ordering.
function replaySev(s){return s==='critical'?0:s==='warning'?1:2;}

// replayChip renders one labeled summary tile for the replay header.
function replayChip(label,val,color){
  return '<div style="background:var(--c2);border:1px solid var(--bd);border-radius:6px;padding:5px 9px;min-width:62px">'
    +'<div style="font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3)">'+esc(label)+'</div>'
    +'<div style="font-size:16px;font-weight:600;color:'+color+'">'+esc(String(val))+'</div></div>';
}

// replayRow renders one finding row, badged as newly appeared or resolved.
function replayRow(f,mark){
  var c=f.severity==='critical'?'var(--cr)':f.severity==='warning'?'var(--wn)':'var(--ac)';
  var badge='';
  if(mark==='new')badge=' <span style="background:rgba(63,185,80,.15);color:var(--ok);font-size:9px;padding:1px 5px;border-radius:3px">new</span>';
  else if(mark==='resolved')badge=' <span style="background:rgba(139,148,158,.12);color:var(--t3);font-size:9px;padding:1px 5px;border-radius:3px">resolved</span>';
  var op=mark==='resolved'?'opacity:.5;':'';
  var cl=(f.cluster&&f.cluster!=='fleet')?f.cluster:'fleet';
  return '<div style="display:flex;align-items:center;gap:8px;padding:6px 8px;border-left:3px solid '+c+';background:var(--c2);border-radius:4px;margin-bottom:4px;'+op+'">'
    +'<span style="font-size:9px;text-transform:uppercase;color:'+c+';min-width:52px">'+esc(f.severity)+'</span>'
    +'<span style="flex:1;font-size:12px;color:var(--tx)">'+esc(f.title)+badge+'</span>'
    +'<span class="mono" style="font-size:10px;color:var(--t3)">'+esc(cl)+'</span>'
    +'</div>';
}

// renderChronic fills the persistence panel: findings ranked by how often they
// recur across the scan window, with class, recurrence bar, and ack marker.
function renderChronic(pers){
  var box=document.getElementById('replayChronic');
  if(!box)return;
  var list=(pers&&pers.findings)||[];
  if(!list.length){box.innerHTML='<div class="empty" style="padding:14px">No findings.</div>';return;}
  var head='<div style="display:flex;gap:8px;margin-bottom:8px;font-size:11px">'
    +'<span style="color:var(--cr)">Chronic '+(pers.chronic||0)+'</span>·'
    +'<span style="color:var(--wn)">Intermittent '+(pers.intermittent||0)+'</span>·'
    +'<span style="color:var(--t3)">Transient '+(pers.transient||0)+'</span></div>';
  var rows=list.slice(0,16).map(function(p){
    var cc=p.class==='chronic'?'var(--cr)':p.class==='intermittent'?'var(--wn)':'var(--t3)';
    var pct=Math.round(p.fraction*100);
    var ack=p.acked?' <span title="Acknowledged" style="color:var(--t3);font-size:10px">ack</span>':'';
    var sevc=p.severity==='critical'?'var(--cr)':p.severity==='warning'?'var(--wn)':'var(--ac)';
    return '<div style="padding:6px 8px;background:var(--c2);border-radius:4px;margin-bottom:4px">'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<span style="font-size:9px;text-transform:uppercase;color:'+cc+';min-width:80px">'+esc(p.class)+'</span>'
      +'<span style="flex:1;font-size:12px;color:var(--tx)">'+esc(p.title)+ack+'</span>'
      +'<span class="mono" style="font-size:11px;color:'+sevc+'">'+pct+'%</span>'
      +'</div>'
      +'<div style="height:4px;background:var(--c3);border-radius:2px;margin-top:5px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+cc+'"></div></div>'
      +'<div style="font-size:10px;color:var(--t3);margin-top:3px">present in '+p.present+' of '+p.total+' scans · streak '+p.streak+'</div>'
      +'</div>';
  }).join('');
  box.innerHTML=head+rows;
}

// === Fleet heatmap: clusters x scanners colored by worst severity ===
async function renderHeatmap(){
  renderBar('');
  var scans=await api('/scans?limit=1');
  if(!scans||!scans.length)return '<div class="empty">No scans yet. Trigger a scan from the Dashboard.</div>';
  var rpt=await api('/scans/'+scans[0].id+'/report');
  var clusters=rpt.clusters||[];
  var scannerSet={};
  var byCellSev={}; // key = cluster||scanner
  var byCellCount={};
  (rpt.findings||[]).forEach(function(f){
    if(!f.scanner||f.cluster==='fleet')return;
    scannerSet[f.scanner]=true;
    var key=f.cluster+'||'+f.scanner;
    var rank={'critical':3,'warning':2,'info':1};
    if((rank[f.severity]||0)>(rank[byCellSev[key]]||0))byCellSev[key]=f.severity;
    byCellCount[key]=(byCellCount[key]||0)+1;
  });
  var scanners=Object.keys(scannerSet).sort();
  if(!scanners.length)return '<div class="empty">No findings to plot.</div>';
  var labels=window._scannerLabels||{};
  var h='<h2>Fleet heatmap</h2><p class="sub">Clusters × scanners, colored by worst-severity finding for the cell. Click a cell to drill into the Findings page filtered to that cluster + scanner.</p>';
  h+='<div style="display:flex;gap:14px;align-items:center;margin-bottom:10px;font-size:11px;color:var(--t2)">';
  h+='Legend: <span style="display:inline-block;width:14px;height:14px;background:rgba(63,185,80,.5);border-radius:3px"></span> ok ';
  h+='<span style="display:inline-block;width:14px;height:14px;background:rgba(88,166,255,.5);border-radius:3px"></span> info ';
  h+='<span style="display:inline-block;width:14px;height:14px;background:rgba(210,153,34,.5);border-radius:3px"></span> warning ';
  h+='<span style="display:inline-block;width:14px;height:14px;background:rgba(248,81,73,.6);border-radius:3px"></span> critical';
  h+='</div>';
  h+='<div class="tw"><table style="border-collapse:separate;border-spacing:2px"><thead><tr><th></th>';
  scanners.forEach(function(s){h+='<th style="text-align:center;writing-mode:vertical-rl;transform:rotate(180deg);padding:6px 2px;height:120px">'+esc(labels[s]||s)+'</th>'});
  h+='</tr></thead><tbody>';
  clusters.forEach(function(c){
    h+='<tr><td style="font-weight:500;font-size:12px;white-space:nowrap;padding-right:8px">'+esc(c)+'</td>';
    scanners.forEach(function(s){
      var sev=byCellSev[c+'||'+s];
      var count=byCellCount[c+'||'+s]||0;
      var bg='rgba(63,185,80,.25)';
      if(sev==='info')bg='rgba(88,166,255,.5)';
      else if(sev==='warning')bg='rgba(210,153,34,.6)';
      else if(sev==='critical')bg='rgba(248,81,73,.7)';
      var tip=count?(count+' '+(sev||'')+' finding(s)'):'no findings';
      h+='<td style="background:'+bg+';width:32px;height:24px;cursor:pointer;text-align:center;font-size:10px;color:var(--tx);border-radius:3px" data-tip="'+esc(tip)+'" onclick="nav(\'findings\');setTimeout(function(){var s=document.getElementById(\'fSearch\');if(s){s.value=\''+esc(c)+'\';s.dispatchEvent(new Event(\'input\'))}},150)">'+(count||'')+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  return h;
}

    '  </div>';

  h+='<div id="globe-legend" style="margin-top:10px;font-size:11px;color:var(--t2);display:flex;gap:18px;flex-wrap:wrap">';

// globeState holds runtime state for the page: the filter set, currently
// selected cluster, tour interval, and the full point set so list rebuilds
// don't need to refetch.
var globeState={
  points:[],
  filter:{healthy:true,busy:true,degraded:true,critical:true},
  selected:null,
  tourTimer:null,
  search:'',
};

// renderGlobeSide rebuilds the side panel: severity-count chips, action
// panel for the selected cluster, and the cluster list filtered by status
// and search. Called whenever filter/selection/search changes.
function renderGlobeSide(){
  var pts=globeState.points;
  var counts={critical:0,degraded:0,busy:0,healthy:0};
  pts.forEach(function(p){var s=p.status==='strained'?'degraded':p.status;if(counts[s]!==undefined)counts[s]++});

  var filterHTML='';
  ['critical','degraded','busy','healthy'].forEach(function(st){
    var color={critical:'#f85149',degraded:'#d29922',busy:'#58a6ff',healthy:'#3fb950'}[st];
    var on=globeState.filter[st];
    filterHTML+='<button class="btn globe-filter-btn" data-status="'+st+'" style="border-color:'+color+';color:'+(on?color:'var(--t3)')+';background:'+(on?'rgba(255,255,255,.02)':'transparent')+';text-transform:capitalize">'+st+' '+counts[st]+'</button>';
  });
  document.getElementById('globeFilter').innerHTML=filterHTML;
  document.querySelectorAll('.globe-filter-btn').forEach(function(b){
    b.onclick=function(){var s=b.dataset.status;globeState.filter[s]=!globeState.filter[s];renderGlobeSide();applyGlobeLayers()};
  });

  var summary=document.getElementById('globe-summary');
  summary.innerHTML=
    '<div style="display:flex;justify-content:space-between"><span>Critical</span><span style="color:#f85149;font-weight:600">'+counts.critical+'</span></div>'+
    '<div style="display:flex;justify-content:space-between"><span>Degraded</span><span style="color:#d29922;font-weight:600">'+counts.degraded+'</span></div>'+
    '<div style="display:flex;justify-content:space-between"><span>Busy</span><span style="color:#58a6ff;font-weight:600">'+counts.busy+'</span></div>'+
    '<div style="display:flex;justify-content:space-between"><span>Healthy</span><span style="color:#3fb950;font-weight:600">'+counts.healthy+'</span></div>';

  var sevOrder={critical:0,degraded:1,strained:1,busy:2,healthy:3};
  var visible=pts.filter(function(p){
    var s=p.status==='strained'?'degraded':p.status;
    if(!globeState.filter[s])return false;
    if(globeState.search){
      var q=globeState.search.toLowerCase();
      if((p.cluster||'').toLowerCase().indexOf(q)<0 &&
         (p.site||'').toLowerCase().indexOf(q)<0 &&
         (p.region||'').toLowerCase().indexOf(q)<0 &&
         (p.city||'').toLowerCase().indexOf(q)<0)return false;
    }
    return true;
  }).slice().sort(function(a,b){
    var as=a.status==='strained'?'degraded':a.status;
    var bs=b.status==='strained'?'degraded':b.status;
    var d=(sevOrder[as]||4)-(sevOrder[bs]||4);
    if(d!==0)return d;
    return (a.cluster||'').localeCompare(b.cluster||'');
  });

  var list=document.getElementById('globe-list');
  if(!visible.length){list.innerHTML='<div class="empty" style="padding:30px 16px;font-size:12px">No clusters match your filters.</div>';return}
  var color={critical:'#f85149',degraded:'#d29922',busy:'#58a6ff',healthy:'#3fb950'};
  var rows='';
  visible.forEach(function(p){
    var s=p.status==='strained'?'degraded':p.status;
    var c=color[s]||'#8b949e';
    var sub=p.site||p.city||p.region||'';
    var sel=globeState.selected===p.cluster;
    rows+='<div class="globe-row" data-cluster="'+esc(p.cluster)+'" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--bd);'+(sel?'background:var(--c3)':'')+';transition:background .1s">'+
      '<div style="display:flex;align-items:center;gap:8px">'+
      '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+c+';flex-shrink:0"></span>'+
      '<div style="flex:1;min-width:0">'+
      '<div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(p.cluster)+'</div>'+
      '<div style="font-size:10px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(sub)+'</div>'+
      '</div>'+
      (p.critical_findings?'<span style="font-size:10px;color:#f85149;font-weight:600">'+p.critical_findings+'</span>':'')+
      '</div></div>';
  });
  list.innerHTML=rows;
  list.querySelectorAll('.globe-row').forEach(function(row){
    row.onclick=function(){selectGlobeCluster(row.dataset.cluster)};
    row.onmouseenter=function(){if(!row.style.background)row.style.background='var(--c2)'};
    row.onmouseleave=function(){var sel=globeState.selected===row.dataset.cluster;row.style.background=sel?'var(--c3)':''};
  });
}

// selectGlobeCluster flies the camera to a cluster, marks it selected in
// the side list, and surfaces an action panel with drill-in buttons. This
// is the central interaction: a single click on either the globe or the
// list activates the same flow.
function selectGlobeCluster(cluster){
  var p=globeState.points.filter(function(x){return x.cluster===cluster})[0];
  if(!p)return;
  globeState.selected=cluster;
  if(window._globeInstance){
    window._globeInstance.pointOfView({lat:p.lat,lng:p.lng,altitude:1.6},900);
  }
  var s=p.status==='strained'?'degraded':p.status;
  var color={critical:'#f85149',degraded:'#d29922',busy:'#58a6ff',healthy:'#3fb950'}[s]||'#8b949e';
  var act=document.getElementById('globe-action');
  act.style.display='block';
  act.innerHTML=
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="width:10px;height:10px;border-radius:50%;background:'+color+';display:inline-block"></span><span style="font-weight:600;font-size:13px">'+esc(p.cluster)+'</span></div>'+
    '<div style="font-size:11px;color:var(--t2);margin-bottom:8px">'+esc(s)+' &middot; '+esc(p.source||'auto')+(p.region?(' &middot; '+esc(p.region)):'')+(p.site?(' &middot; '+esc(p.site)):(p.city?(' &middot; '+esc(p.city)):''))+'</div>'+
    (p.critical_findings?'<div style="font-size:11px;color:#f85149;margin-bottom:2px">'+p.critical_findings+' critical findings</div>':'')+
    (p.warning_findings?'<div style="font-size:11px;color:#d29922;margin-bottom:6px">'+p.warning_findings+' warning findings</div>':'')+
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">'+
    '<button class="btn btn-ac" data-action="globe-drill" data-cluster="'+esc(p.cluster)+'">Open cluster page</button>'+
    '<button class="btn" data-action="globe-findings" data-cluster="'+esc(p.cluster)+'">Filter findings by this cluster</button>'+
    '<button class="btn copy-btn" data-copy="kubectl --context '+esc(p.cluster)+' get nodes">Copy kubectl</button>'+
    '</div>';
  act.querySelectorAll('button[data-action]').forEach(function(b){
    b.onclick=function(){
      var a=b.dataset.action,c=b.dataset.cluster;
      if(a==='globe-drill')window.nav('detail',{cluster:c});
      else if(a==='globe-findings'){window.nav('findings');setTimeout(function(){var s=document.getElementById('fSearch');if(s){s.value=c;s.dispatchEvent(new Event('input'))}},150)}
    };
  });
  renderGlobeSide();
}

// applyGlobeLayers refreshes the globe's points/rings/labels data based on
// the active filter set, without recreating the scene.
function applyGlobeLayers(){
  if(!window._globeInstance)return;
  var f=globeState.filter;
  var pts=globeState.points.filter(function(p){var s=p.status==='strained'?'degraded':p.status;return f[s]});
  var colors={'healthy':'#3fb950','busy':'#58a6ff','degraded':'#d29922','strained':'#d29922','critical':'#f85149'};
  var pointsData=pts.map(function(p){return {
    lat:p.lat,lng:p.lng,
    size:p.status==='critical'?0.8:(globeState.selected===p.cluster?0.7:0.4),
    color:colors[p.status]||'#8b949e',
    cluster:p.cluster,status:p.status,source:p.source,region:p.region,provider:p.provider,
    site:p.site,city:p.city,
    critical:p.critical_findings,warning:p.warning_findings,
  }});
  var ringsData=pts.filter(function(p){return p.status==='critical'}).map(function(p){
    return {lat:p.lat,lng:p.lng,maxR:5,propagationSpeed:2,repeatPeriod:1100};
  });
  var labelsData=pts.filter(function(p){return p.source==='manual'||p.source==='configmap'||p.source==='annotation'||p.status==='critical'||globeState.selected===p.cluster}).map(function(p){
    return {lat:p.lat,lng:p.lng,text:p.site||p.cluster,size:globeState.selected===p.cluster?0.55:(p.source!=='auto'?0.45:0.35),color:p.status==='critical'?'#ffb4b4':'#e6edf3'};
  });
  window._globeInstance.pointsData(pointsData).ringsData(ringsData).labelsData(labelsData);
}

// initGlobe fetches /api/geo, loads globe.gl on first use, and mounts the
// scene into #globe-wrap. Safe to call repeatedly: a prior globe instance
// is disposed before a new one mounts. Surfaces failures visibly so a
// blocked CDN or empty endpoint cannot leave a silent blank canvas.
async function initGlobe(){
  var wrap=document.getElementById('globe-wrap');
  function showError(msg,detail){
    wrap.innerHTML='<div class="empty" style="padding:60px 30px;color:#e6edf3;text-align:left;max-width:700px;margin:0 auto"><div style="font-size:15px;color:#f85149;margin-bottom:10px">'+escapeHtml(msg)+'</div><pre style="font-size:11px;color:#8b949e;white-space:pre-wrap;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px">'+escapeHtml(detail||'')+'</pre></div>';
  }
  try{
    await loadGlobeLib();
  }catch(e){
    showError('Could not load globe library from CDN.','Browser blocked or could not reach unpkg.com. Check your network and devtools console.\n\n'+e.message);
    return;
  }
  var resp;
  try{
    resp=await api('/geo');
  }catch(e){
    showError('Could not fetch /api/geo.',e.message);
    return;
  }
  if(!resp){
    showError('Empty response from /api/geo.','');
    return;
  }
  if(!resp.points||!resp.points.length){
    wrap.innerHTML='<div class="empty" style="padding-top:200px">No clusters with locations. Run <code class="mono">fleetsweeper location set &lt;cluster&gt; --lat X --lng Y --site "..."</code> or scan a cluster with cloud region labels. (demo: '+(resp.demo?'on':'off')+')</div>';
    document.getElementById('globe-located-count').textContent='0';
    document.getElementById('globe-unlocated-count').textContent=String((resp.unlocated||[]).length);
    return;
  }
  var pts=resp.points;
  globeState.points=pts;
  globeState.selected=null;
  if(globeState.tourTimer){clearInterval(globeState.tourTimer);globeState.tourTimer=null}
  document.getElementById('globe-located-count').textContent=pts.length;
  document.getElementById('globe-unlocated-count').textContent=(resp.unlocated||[]).length;
  if(resp.unlocated&&resp.unlocated.length){
    document.getElementById('globe-unlocated').textContent='Unplaced: '+resp.unlocated.slice(0,10).join(', ')+(resp.unlocated.length>10?' (and '+(resp.unlocated.length-10)+' more)':'');
  }

  var colors={'healthy':'#3fb950','busy':'#58a6ff','degraded':'#d29922','strained':'#d29922','critical':'#f85149'};
  function colorOf(s){return colors[s]||'#8b949e'}

  if(window._globeInstance&&window._globeInstance._destructor){window._globeInstance._destructor()}
  wrap.innerHTML='';

  // Two layers: steady points for every cluster, rings for critical only.
  var pointsData=pts.map(function(p){
    return {
      lat:p.lat,lng:p.lng,
      size: p.status==='critical'?0.8:0.4,
      color: colorOf(p.status),
      label:p.cluster+(p.site?(' • '+p.site):(p.city?(' • '+p.city):'')),
      cluster:p.cluster,
      status:p.status,
      source:p.source,
      region:p.region,
      provider:p.provider,
      critical:p.critical_findings,
      warning:p.warning_findings,
    };
  });
  var ringsData=pts.filter(function(p){return p.status==='critical'}).map(function(p){
    return {lat:p.lat,lng:p.lng,maxR:5,propagationSpeed:2,repeatPeriod:1100};
  });
  var labelsData=pts.filter(function(p){return p.source==='manual'||p.status==='critical'}).map(function(p){
    return {
      lat:p.lat,lng:p.lng,
      text:p.site||p.cluster,
      size:p.source==='manual'?0.45:0.35,
      color:p.status==='critical'?'#ffb4b4':'#e6edf3',
    };
  });

  if(typeof Globe!=='function'){
    showError('globe.gl loaded but the Globe constructor is not available.','window.Globe is '+(typeof Globe));
    return;
  }
  var globe;
  try{
    globe=Globe()(wrap)
    .globeImageUrl('/vendor/earth-night.jpg')
    .bumpImageUrl('/vendor/earth-topology.png')
    .backgroundColor('rgba(0,0,0,0)')
    .atmosphereColor('#58a6ff')
    .atmosphereAltitude(0.18)
    .pointsData(pointsData)
    .pointLat('lat').pointLng('lng').pointColor('color')
    .pointAltitude(function(d){return d.status==='critical'?0.06:0.02})
    .pointRadius('size')
    .pointLabel(function(d){
      var sourceLabel={'manual':'manual override','configmap':'in-cluster ConfigMap','annotation':'in-cluster annotation','auto':'auto-detected'}[d.source]||d.source;
      return '<div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 10px;font-family:system-ui;font-size:12px;color:#e6edf3;max-width:260px">'+
        '<div style="font-weight:600;margin-bottom:4px">'+escapeHtml(d.cluster)+'</div>'+
        '<div style="color:#8b949e">'+escapeHtml(d.status)+' &middot; '+escapeHtml(sourceLabel)+'</div>'+
        (d.region?'<div style="color:#8b949e">'+escapeHtml(d.region)+(d.provider?' &middot; '+escapeHtml(d.provider):'')+'</div>':'')+
        (d.critical?'<div style="color:#f85149">'+d.critical+' critical</div>':'')+
        (d.warning?'<div style="color:#d29922">'+d.warning+' warning</div>':'')+
      '</div>';
    })
    .onPointClick(function(d){selectGlobeCluster(d.cluster)})
    .ringsData(ringsData)
    .ringColor(function(){return function(t){return 'rgba(248,81,73,'+(1-t)+')'}})
    .ringMaxRadius('maxR')
    .ringPropagationSpeed('propagationSpeed')
    .ringRepeatPeriod('repeatPeriod')
    .labelsData(labelsData)
    .labelLat('lat').labelLng('lng').labelText('text').labelSize('size')
    .labelColor(function(d){return d.color})
    .labelDotRadius(0.25)
    .labelResolution(2);
  }catch(e){
    showError('Globe failed to initialize.',e.message+(e.stack?('\n\n'+e.stack):''));
    return;
  }

  globe.width(wrap.clientWidth).height(640);
  globe.controls().autoRotate=window.globeAutoRotate!==false;
  globe.controls().autoRotateSpeed=0.4;
  globe.controls().enableDamping=true;

  // Focus the camera on the worst cluster after a beat so the eye lands on trouble first.
  var worst=pts.filter(function(p){return p.status==='critical'})[0]||pts[0];
  if(worst){
    setTimeout(function(){globe.pointOfView({lat:worst.lat,lng:worst.lng,altitude:2.2},1500)},400);
  }

  window._globeInstance=globe;
  applyGlobeDayNight(globe);
  window.addEventListener('resize',function(){if(window._globeInstance)window._globeInstance.width(wrap.clientWidth)});

  renderGlobeSide();

  // Wire the toolbar controls (search, tour, rotation toggle). These live in
  // the top bar so they don't compete for space with the globe.
  var search=document.getElementById('globeSearch');
  if(search){
    search.oninput=function(){globeState.search=search.value||'';renderGlobeSide()};
  }
  var rotateBtn=document.getElementById('globeRotateBtn');
  if(rotateBtn){
    rotateBtn.onclick=function(){
      window.globeAutoRotate=!window.globeAutoRotate;
      globe.controls().autoRotate=window.globeAutoRotate;
      rotateBtn.textContent=window.globeAutoRotate?'Pause rotation':'Resume rotation';
    };
  }
  var tourBtn=document.getElementById('globeTourBtn');
  if(tourBtn){
    tourBtn.onclick=function(){
      if(globeState.tourTimer){clearInterval(globeState.tourTimer);globeState.tourTimer=null;tourBtn.textContent='Tour critical';return}
      var criticals=globeState.points.filter(function(p){return p.status==='critical'});
      if(!criticals.length){tourBtn.textContent='No critical clusters';setTimeout(function(){tourBtn.textContent='Tour critical'},1500);return}
      tourBtn.textContent='Stop tour';
      var i=0;
      function step(){selectGlobeCluster(criticals[i%criticals.length].cluster);i++}
      step();
      globeState.tourTimer=setInterval(step,3500);
    };
  }
}

// applyGlobeDayNight positions the globe's directional light at the current
// sub-solar point so the hemisphere facing the sun reads as day and the far
// side as night. It refreshes each minute while the globe is the active page.
function applyGlobeDayNight(globe){
  if(!globe||typeof globe.lights!=='function'||typeof globe.getCoords!=='function')return;
  function sunLatLng(){
    var now=new Date();
    var utcH=now.getUTCHours()+now.getUTCMinutes()/60;
    var lng=(12-utcH)*15; // sub-solar longitude: 0 degrees at 12:00 UTC.
    if(lng<-180)lng+=360;if(lng>180)lng-=360;
    var start=Date.UTC(now.getUTCFullYear(),0,0);
    var doy=Math.floor((now-start)/86400000);
    var decl=23.44*Math.sin(2*Math.PI*(doy-81)/365); // solar declination.
    return {lat:decl,lng:lng};
  }
  function update(){
    var lights=globe.lights();
    if(!lights||!lights.length)return;
    var dir=null,amb=null;
    lights.forEach(function(l){if(l.type==='DirectionalLight')dir=l;else if(l.type==='AmbientLight')amb=l});
    var s=sunLatLng();
    if(dir){var c=globe.getCoords(s.lat,s.lng,1);dir.position.set(c.x,c.y,c.z);dir.intensity=1.1}
    if(amb)amb.intensity=0.28;
  }
  update();
  if(window._globeSunTimer)clearInterval(window._globeSunTimer);
  window._globeSunTimer=setInterval(function(){
    if(typeof P!=='undefined'&&P.page!=='globe'){clearInterval(window._globeSunTimer);window._globeSunTimer=null;return}
    if(!document.hidden)update();
  },60000);
}

// loadGlobeLib loads globe.gl from CDN once and resolves when window.Globe
// is available. globe.gl bundles Three.js so a single script tag is enough.
function loadGlobeLib(){
  if(window.Globe)return Promise.resolve();
  return new Promise(function(resolve,reject){
    var s=document.createElement('script');
    s.src='/vendor/globe.gl.min.js';
    s.onload=resolve;
    s.onerror=function(){reject(new Error('failed to load globe.gl'))};
    document.head.appendChild(s);
  });
}

// escapeHtml is a tiny escape for the globe label HTML, which renders outside
// the SPA's normal sanitization path.
function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]})}

window.globeAutoRotate=true;

// === Scan diff: pick two scans, show resolved vs new findings ===
async function renderDiff(){
  renderBar('');
  var scans=await api('/scans?limit=20');
  if(!scans||scans.length<2)return '<div class="empty">Need at least 2 scans for diff. Trigger a scan from the Dashboard.</div>';
  var aId=P.diffA||scans[1].id;
  var bId=P.diffB||scans[0].id;
  var h='<h2>Scan diff</h2><p class="sub">Compare two scans to see what changed: findings that resolved, findings that are new, summary deltas.</p>';
  function opts(sel){return scans.map(function(s){return '<option value="'+s.id+'"'+(s.id===sel?' selected':'')+'>'+esc(s.id)+' · '+esc(s.timestamp)+'</option>'}).join('')}
  h+='<div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;font-size:12px">';
  h+='<label>Base (older): <select id="diffA" style="background:var(--c2);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;color:var(--tx);font-size:11px">'+opts(aId)+'</select></label>';
  h+='<label>Target (newer): <select id="diffB" style="background:var(--c2);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;color:var(--tx);font-size:11px">'+opts(bId)+'</select></label>';
  h+='<button class="btn btn-ac" onclick="P.diffA=document.getElementById(\'diffA\').value;P.diffB=document.getElementById(\'diffB\').value;render()">Compare</button>';
  h+='</div>';
  var ra=await api('/scans/'+aId+'/report');
  var rb=await api('/scans/'+bId+'/report');
  function key(f){return f.severity+'|'+f.cluster+'|'+f.scanner+'|'+f.title}
  var aSet={};(ra.findings||[]).forEach(function(f){aSet[key(f)]=f});
  var bSet={};(rb.findings||[]).forEach(function(f){bSet[key(f)]=f});
  var resolved=[],added=[];
  Object.keys(aSet).forEach(function(k){if(!bSet[k])resolved.push(aSet[k])});
  Object.keys(bSet).forEach(function(k){if(!aSet[k])added.push(bSet[k])});
  h+='<div class="g g2">';
  h+='<div class="cd"><h3 style="color:var(--cr);margin-top:0">New ('+added.length+')</h3>';
  if(!added.length)h+='<p class="sub">No new findings.</p>';
  else added.slice(0,50).forEach(function(f){h+='<div style="padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px"><span class="tag" style="background:rgba(248,81,73,.1);color:var(--cr)">'+esc(f.severity)+'</span> '+esc(f.cluster)+' · '+esc(f.title)+'</div>'});
  h+='</div>';
  h+='<div class="cd"><h3 style="color:var(--ok);margin-top:0">Resolved ('+resolved.length+')</h3>';
  if(!resolved.length)h+='<p class="sub">No resolved findings.</p>';
  else resolved.slice(0,50).forEach(function(f){h+='<div style="padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px;opacity:.7"><span class="tag" style="background:rgba(63,185,80,.1);color:var(--ok)">'+esc(f.severity)+'</span> '+esc(f.cluster)+' · '+esc(f.title)+'</div>'});
  h+='</div></div>';
  h+='<button class="btn btn-ac copy-btn" data-copy="'+esc(diffMarkdown(aId,bId,resolved,added))+'" style="margin-top:14px">Copy Markdown summary</button>';
  return h;
}

// diffMarkdown formats a scan diff as markdown for incident-channel paste.
function diffMarkdown(a,b,resolved,added){
  var lines=['## Scan diff: '+a+' → '+b,'','### Resolved ('+resolved.length+')'];
  resolved.forEach(function(f){lines.push('- '+f.severity+' '+f.cluster+': '+f.title)});
  lines.push('','### New ('+added.length+')');
  added.forEach(function(f){lines.push('- '+f.severity+' '+f.cluster+': '+f.title)});
  return lines.join('\n');
}

render();

// === Enhancements: hash routing, copy buttons, Cmd-K palette, markdown export ===
// The original SPA mutated a private P state and called render() directly. This
// layer wraps nav() so every navigation also pushes a hash, and a hashchange
// listener restores state on reload or back/forward, making URLs bookmarkable
// and Slack-pasteable. Hash routing works under file:// as well as http://.

(function(){
  var originalNav=window.nav;
  function pageToHash(page,opts){
    opts=opts||{};
    if(page==='dash')return '#/';
    if(page==='detail'&&opts.cluster)return '#/cluster/'+encodeURIComponent(opts.cluster);
    if(page==='scanReport'&&opts.scanId)return '#/scan/'+encodeURIComponent(opts.scanId);
    return '#/'+page;
  }
  function hashToState(){
    var h=(location.hash||'#/').replace(/^#\/?/,'');
    if(!h)return {page:'dash'};
    var parts=h.split('/');
    if(parts[0]==='cluster'&&parts[1])return {page:'detail',cluster:decodeURIComponent(parts[1])};
    if(parts[0]==='scan'&&parts[1])return {page:'scanReport',scanId:decodeURIComponent(parts[1])};
    return {page:parts[0]||'dash'};
  }
  window.nav=function(page,opts){
    var hash=pageToHash(page,opts);
    if(location.hash!==hash){
      try{history.pushState({},'',hash)}catch(_){location.hash=hash}
    }
    originalNav(page,opts);
  };
  window.addEventListener('hashchange',function(){
    var s=hashToState();
    originalNav(s.page,s);
  });
  window.addEventListener('popstate',function(){
    var s=hashToState();
    originalNav(s.page,s);
  });
  // Boot: if a hash was present on load, restore that view.
  if(location.hash&&location.hash!=='#/'){
    var s=hashToState();
    originalNav(s.page,s);
  }
})();

// Delegated copy-button handler: every .copy-btn writes its data-copy attribute
// to the clipboard and flashes a "Copied" badge for 1.2s. This is keyboard
// accessible because .copy-btn is a real <button>.
document.addEventListener('click',function(ev){
  var btn=ev.target.closest('.copy-btn');
  if(!btn)return;
  ev.preventDefault();
  ev.stopPropagation();
  var text=btn.getAttribute('data-copy')||'';
  function done(ok){
    var original=btn.textContent;
    btn.textContent=ok?'Copied':'Copy failed';
    btn.classList.add('btn-ac');
    setTimeout(function(){btn.textContent=original;btn.classList.remove('btn-ac')},1200);
  }
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){done(true)},function(){done(false)});
  }else{
    // Fallback for older browsers.
    var ta=document.createElement('textarea');
    ta.value=text;document.body.appendChild(ta);ta.select();
    try{document.execCommand('copy');done(true)}catch(_){done(false)}
    document.body.removeChild(ta);
  }
});

// Markdown export of "today's criticals". Wires a floating action button on
// the Findings page. Builds a markdown block of all critical findings with
// their remediation commands and triggers a file download.
function exportCriticalsMarkdown(){
  var nodes=document.querySelectorAll('.fi[data-sev="critical"]');
  var dateStr=new Date().toISOString().slice(0,10);
  var lines=['## Critical findings: '+dateStr,''];
  if(!nodes.length){
    lines.push('_No critical findings._');
  }else{
    nodes.forEach(function(el){
      var cluster=el.dataset.cluster||'fleet';
      var title=el.querySelector('div[style*="font-size:13px"]');
      var titleText=title?title.textContent.trim():'';
      var rem=el.querySelector('.remediation');
      var remText=rem?rem.textContent.trim():'';
      lines.push('- **'+cluster+'**: '+titleText);
      if(remText)lines.push('  ```');
      if(remText)remText.split('\n').forEach(function(l){lines.push('  '+l)});
      if(remText)lines.push('  ```');
    });
  }
  var blob=new Blob([lines.join('\n')+'\n'],{type:'text/markdown'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='fleetsweeper-criticals-'+dateStr+'.md';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// Inject the markdown export button when the Findings page renders. We watch
// for #ct changes via a MutationObserver, cheap and resilient to the SPA's
// frequent full-replacement re-renders.
(function(){
  var ct=document.getElementById('ct');
  if(!ct)return;
  var observer=new MutationObserver(function(){
    if(typeof P==='undefined'||P.page!=='findings')return;
    var bar=document.getElementById('bar');
    if(!bar||bar.querySelector('.md-export'))return;
    var btn=document.createElement('button');
    btn.className='btn btn-ac md-export';
    btn.type='button';
    btn.textContent='Export critical findings (Markdown)';
    btn.onclick=exportCriticalsMarkdown;
    bar.appendChild(btn);
  });
  observer.observe(ct,{childList:true,subtree:true});
})();

// Cmd-K command palette. Press Cmd-K (Ctrl-K on Linux/Windows) to open a
// fuzzy-matched picker over clusters, scanners, and navigation commands.
(function(){
  var overlay=null;
  function open(){
    if(overlay)return;
    overlay=document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:10000;display:flex;align-items:flex-start;justify-content:center;padding-top:80px';
    overlay.innerHTML='<div style="background:var(--c1);border:1px solid var(--bd);border-radius:8px;width:520px;max-width:90vw;max-height:60vh;display:flex;flex-direction:column;overflow:hidden">'+
      '<input type="search" id="cmdkSearch" placeholder="Type to search clusters, scanners, pages..." autofocus style="border:0;border-bottom:1px solid var(--bd);padding:12px 14px;font-size:14px;background:transparent;color:var(--tx);outline:none">'+
      '<div id="cmdkList" style="overflow-y:auto;flex:1"></div>'+
      '<div style="border-top:1px solid var(--bd);padding:6px 12px;font-size:10px;color:var(--t3)">Up/Down to navigate &nbsp;|&nbsp; Enter to select &nbsp;|&nbsp; Esc to close</div>'+
      '</div>';
    document.body.appendChild(overlay);
    overlay.addEventListener('click',function(e){if(e.target===overlay)close()});
    var input=overlay.querySelector('#cmdkSearch');
    var list=overlay.querySelector('#cmdkList');
    var sel=0;
    function items(){
      var nav=[
        {label:'Dashboard',action:function(){window.nav('dash')}},
        {label:'Findings',action:function(){window.nav('findings')}},
        {label:'Scan history',action:function(){window.nav('scans')}},
        {label:'Capacity',action:function(){window.nav('capacity')}},
        {label:'Trends',action:function(){window.nav('trends')}},
        {label:'Outliers',action:function(){window.nav('outliers')}},
        {label:'Fleet heatmap',action:function(){window.nav('heatmap')}},
        {label:'Globe (3D fleet map)',action:function(){window.nav('globe')}},
        {label:'Scan diff',action:function(){window.nav('diff')}},
        {label:'Clusters',action:function(){window.nav('clusters')}},
        {label:'Groups',action:function(){window.nav('groups')}},
        {label:'Trigger scan',action:function(){if(typeof triggerScan==='function')triggerScan()}},
      ];
      var clusters=(window._dashReport&&window._dashReport.clusters||[]).map(function(c){
        return {label:'Cluster: '+c,action:function(){window.nav('detail',{cluster:c})}};
      });
      return nav.concat(clusters);
    }
    function render(){
      var q=input.value.toLowerCase();
      var matches=items().filter(function(it){return !q||it.label.toLowerCase().indexOf(q)>=0});
      if(sel>=matches.length)sel=matches.length-1;
      if(sel<0)sel=0;
      list.innerHTML=matches.map(function(it,i){
        return '<div class="cmdk-item" data-i="'+i+'" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--bd);'+(i===sel?'background:var(--c3);color:var(--ac)':'color:var(--tx)')+'">'+it.label.replace(/</g,'&lt;')+'</div>';
      }).join('') || '<div style="padding:20px;text-align:center;color:var(--t2)">No matches</div>';
      list.querySelectorAll('.cmdk-item').forEach(function(el){
        el.addEventListener('mouseenter',function(){sel=parseInt(el.dataset.i,10);render()});
        el.addEventListener('click',function(){var m=items().filter(function(it){return !q||it.label.toLowerCase().indexOf(q)>=0});if(m[sel]){m[sel].action();close()}});
      });
    }
    input.addEventListener('input',render);
    input.addEventListener('keydown',function(e){
      var q=input.value.toLowerCase();
      var matches=items().filter(function(it){return !q||it.label.toLowerCase().indexOf(q)>=0});
      if(e.key==='ArrowDown'){sel=(sel+1)%matches.length;render();e.preventDefault()}
      else if(e.key==='ArrowUp'){sel=(sel-1+matches.length)%matches.length;render();e.preventDefault()}
      else if(e.key==='Enter'){if(matches[sel]){matches[sel].action();close()};e.preventDefault()}
      else if(e.key==='Escape'){close();e.preventDefault()}
    });
    render();
  }
  function close(){if(overlay){overlay.remove();overlay=null}}
  document.addEventListener('keydown',function(e){
    if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();open()}
  });
})();
