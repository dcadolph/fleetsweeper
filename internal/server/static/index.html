<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleetsweeper</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="tour.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--c1:#161b22;--c2:#1c2128;--c3:#21262d;--tx:#e6edf3;--t2:#8b949e;--t3:#6e7681;--bd:#30363d;--ac:#58a6ff;--ok:#3fb950;--wn:#d29922;--cr:#f85149;--mono:"SF Mono","Fira Code","Cascadia Code",monospace}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}
a{color:var(--ac);text-decoration:none;cursor:pointer}a:hover{text-decoration:underline}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sb{width:220px;min-width:220px;background:var(--c1);border-right:1px solid var(--bd);padding:14px 0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;font-size:13px}
.sb h1{font-size:15px;font-weight:600;color:var(--tx);margin:0}
.sb-brand{display:flex;align-items:center;gap:10px;padding:0 14px 10px;border-bottom:1px solid var(--bd);margin-bottom:6px}
.sb-logo{width:28px;height:28px;border-radius:6px;object-fit:cover;flex-shrink:0;box-shadow:0 0 0 1px rgba(88,166,255,.25)}
.sb a.sb-show-welcome{color:var(--t3);font-size:11px}
.sb .hd.sb-help-hd{margin-top:auto;border-top:1px solid var(--bd);padding-top:10px}
.sb a.sb-show-welcome:hover{color:var(--ac)}
.sb a{display:block;padding:4px 14px;color:var(--t2);border-left:2px solid transparent;transition:all .1s}
.sb a:hover{color:var(--tx);background:rgba(88,166,255,.04);text-decoration:none}
.sb a.on{color:var(--ac);border-color:var(--ac);background:rgba(88,166,255,.06)}
.sb .hd{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t2);padding:14px 14px 4px}
.chgroup{margin:6px 0}
.chgroup>summary{cursor:pointer;display:flex;align-items:center;gap:6px;margin:8px 0 6px;list-style:none;user-select:none}
.chgroup>summary::-webkit-details-marker{display:none}
.chgroup>summary::before{content:'\25B8';color:var(--t3);font-size:10px}
.chgroup[open]>summary::before{content:'\25BE'}
.sb .foot{padding:10px 14px;border-top:1px solid var(--bd);font-size:11px;color:var(--t3)}
.dash-toc{position:sticky;top:0;z-index:5;display:flex;flex-wrap:wrap;gap:6px;padding:8px 0 10px;margin:0 0 6px;background:var(--bg);border-bottom:1px solid var(--bd)}
.toc-link{font-size:11px;color:var(--t2);background:var(--c2);border:1px solid var(--bd);border-radius:12px;padding:3px 10px;cursor:pointer;transition:all .1s}
.toc-link:hover{color:var(--ac);border-color:var(--ac)}

/* Main */
.mn{flex:1;min-width:0}
.bar{display:flex;align-items:center;gap:10px;padding:8px 20px;background:var(--c1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:10;flex-wrap:wrap}
.bar input{background:var(--c2);border:1px solid var(--bd);border-radius:6px;padding:4px 10px;color:var(--tx);font-size:12px;width:200px;outline:none}
.bar input:focus{border-color:var(--ac)}
.bar select{background:var(--c2);border:1px solid var(--bd);border-radius:6px;padding:4px 8px;color:var(--tx);font-size:11px;outline:none}
input[type=text],input[type=search],input[type=number],input:not([type]),select,textarea{background:var(--c2);border:1px solid var(--bd);border-radius:6px;padding:5px 9px;color:var(--tx);font-size:12px;font-family:inherit;outline:none}
input[type=text]:focus,input[type=search]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:var(--ac)}
::placeholder{color:var(--t3)}
select option{background:var(--c1);color:var(--tx)}
.bar .sp{flex:1}
.btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;font-size:11px;border-radius:5px;cursor:pointer;border:1px solid var(--bd);background:var(--c2);color:var(--t2);transition:background .1s}
.btn:hover{background:var(--c3);color:var(--tx)}
.btn-ac{border-color:rgba(88,166,255,.3);color:var(--ac);background:rgba(88,166,255,.06)}
.btn-ok{border-color:rgba(63,185,80,.3);color:var(--ok);background:rgba(63,185,80,.06)}

.ct{padding:20px 24px;max-width:1300px}
h2{font-size:17px;margin-bottom:10px}
h3{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px}
.sub{font-size:12px;color:var(--t2);margin-bottom:12px}

/* Grid */
.g{display:grid;gap:10px;margin-bottom:14px}
.g6{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
.g2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}

/* Cards */
.cd{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;position:relative;overflow:hidden}
.cd:hover{border-color:var(--c3)}
.st{text-align:center}.st .v{font-size:22px;font-weight:700}.st .l{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.st.click{cursor:pointer;transition:transform .1s,border-color .1s}.st.click:hover{transform:translateY(-2px);border-color:var(--ac)}

/* Cluster card */
.cc{cursor:pointer;transition:border-color .15s}
.cc:hover{border-color:var(--ac)}
.cc .ind{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.cc h4{font-size:13px;margin-left:6px;margin-bottom:2px}
.cc .badge{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:1px 6px;border-radius:8px;margin-left:6px}
.cc .row{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);padding:1px 0 1px 6px}
.cc .row .val{color:var(--tx);font-weight:500;font-family:var(--mono);font-size:11px}
.cc canvas{margin-top:6px}
.tag-chips{display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;max-width:60%}
.tag-chip{display:inline-block;background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.25);color:var(--ac);font-family:var(--mono);font-size:10px;font-weight:500;padding:1px 6px;border-radius:10px}

/* Findings */
.fi{padding:10px 14px;border:1px solid var(--bd);border-radius:6px;background:var(--c1);margin-bottom:5px}
.fi .tag{font-size:9px;padding:1px 7px;border-radius:4px;font-weight:600;display:inline-block}
.fi.critical{border-left:3px solid var(--cr)}
.fi.warning{border-left:3px solid var(--wn)}
.fi.info{border-left:3px solid var(--ac)}
.fi.hidden{display:none}

/* Tables */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:5px 8px;font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--bd);background:var(--c1);position:sticky;top:0;cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--tx)}
td{padding:5px 8px;border-bottom:1px solid var(--bd)}
tr:nth-child(even) td{background:rgba(255,255,255,.01)}
.mono{font-family:var(--mono);font-size:11px}

/* Charts */
.chc{background:var(--c1);border:1px solid var(--bd);border-radius:8px;padding:14px}
.chc h4{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;text-align:center}
.chc canvas{max-height:200px}

/* Tooltip (JS-positioned) */
#tip-el{position:fixed;background:#1c1f26;color:#e5e7eb;font-size:12px;padding:8px 12px;border-radius:6px;max-width:340px;z-index:9999;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.6);border:1px solid #444c56;line-height:1.45;display:none;word-wrap:break-word}
/* Remediation block inside findings */
.remediation{margin-top:4px;padding:6px 8px;background:var(--bg);border:1px solid var(--bd);border-radius:4px;font-family:var(--mono);font-size:10px;line-height:1.5;color:var(--ac);white-space:pre-wrap;word-break:break-all;overflow-x:auto;user-select:all;cursor:text;max-height:120px}

/* Back link */
.back{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--ac);margin-bottom:12px;cursor:pointer}
.back:hover{text-decoration:underline}

/* Detail section */
.dsec{background:var(--c1);border:1px solid var(--bd);border-radius:8px;margin-bottom:10px;overflow:hidden}
.dsec-h{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.dsec-h:hover{background:var(--c2)}
.dsec-h h4{font-size:13px;font-weight:600}
.dsec-b{padding:12px 14px;display:none}
.dsec.open .dsec-b{display:block}
.dsec.open .chev{transform:rotate(90deg)}
.chev{color:var(--t3);font-size:11px;transition:transform .15s}
pre.json{background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:10px;font-family:var(--mono);font-size:10px;line-height:1.4;overflow:auto;max-height:300px;margin-top:8px}

/* Scan item */
.si{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border:1px solid var(--bd);border-radius:6px;background:var(--c1);margin-bottom:4px}
.si .id{font-family:var(--mono);font-size:11px;color:var(--ac);cursor:pointer}
.si .id:hover{text-decoration:underline}
.si .meta{font-size:11px;color:var(--t2)}

.empty{text-align:center;color:var(--t2);padding:32px;font-size:13px}
.loading{text-align:center;color:var(--t2);padding:40px}
@media(max-width:768px){.sb{display:none}}
</style>
</head>
<body>
<div id="tip-el"></div>
<div class="app">
<aside class="sb" id="sb"></aside>
<div class="mn">
  <div class="bar" id="bar"></div>
  <div class="ct" id="ct"><div class="loading">Loading...</div></div>
</div>
</div>
<script>
var P={page:'dash',cluster:null,scanId:null};
window.P=P;
var COLORS=['#58a6ff','#f85149','#3fb950','#d29922','#bc8cff','#39d353','#f78166','#79c0ff'];
var chartInstances=[];

// Glossary: tooltips for every field, scanner, and metric.
var TIPS={
  // Summary cards.
  clusters:'Total Kubernetes clusters scanned in this run.',
  uniform:'Scanners where every cluster returned identical data. No action needed.',
  divergent:'Scanners where at least one cluster differs from the others. Investigate to determine if the difference is intentional.',
  critical:'High-severity findings that likely need immediate attention: version mismatches, node pressure, resource exhaustion.',
  warnings:'Medium-severity findings: missing policies, quota gaps, elevated utilization.',
  issues:'Total individual divergence points across all scanners.',
  // Scanner names.
  'version':'Compares Kubernetes API server versions (major.minor.patch) across all clusters.',
  'namespaces':'Lists all namespaces per cluster and compares the sets. Detects missing namespaces that should exist fleet-wide.',
  'services':'Enumerates all Services (ClusterIP, NodePort, LoadBalancer) across all namespaces.',
  'ingresses':'Lists Ingress resources, their classes, hosts, and TLS configuration.',
  'rbac':'Compares ClusterRoles, Roles, ClusterRoleBindings, and RoleBindings. Detects permission drift.',
  'security':'Checks Pod Security Standards labels (enforce, audit, warn) on every namespace.',
  'network-policies':'Counts NetworkPolicy resources per namespace. Identifies namespaces with no network segmentation.',
  'resource-quotas':'Lists ResourceQuota and LimitRange objects. Detects clusters with no resource limits.',
  'node-health':'Reads node conditions: Ready, MemoryPressure, DiskPressure, PIDPressure, NetworkUnavailable.',
  'metrics':'Queries the metrics-server API for real-time CPU and memory utilization per node.',
  'events':'Collects Warning-type Kubernetes events. Aggregates by reason to surface recurring issues.',
  'workload-security':'Audits pod security contexts: privileged containers, host namespace access, root users, Linux capability additions, writable root filesystems.',
  'rbac-audit':'Deep RBAC analysis: wildcard permission rules, non-system cluster-admin bindings, default service account grants, automounted tokens.',
  'image-audit':'Checks container image references for :latest tags, missing tags, and absent digest pins (@sha256:).',
  'privileged_containers':'Containers running with privileged=true. Full host kernel access.',
  'host_network_pods':'Pods sharing the host network namespace. Can see all node traffic.',
  'host_pid_pods':'Pods sharing the host PID namespace. Can see and signal all node processes.',
  'run_as_root_containers':'Containers that may run as UID 0. Missing runAsNonRoot constraint.',
  'capability_additions':'Containers requesting Linux capabilities beyond the default set (NET_ADMIN, SYS_PTRACE, etc.).',
  'cluster_admin_bindings':'ClusterRoleBindings granting cluster-admin to non-system accounts. Unrestricted cluster access.',
  'wildcard_rules':'RBAC rules using * for verbs or resources. Broader than most workloads need.',
  'latest_tag':'Containers using :latest or no tag. Prevents tracking deployed versions.',
  'no_digest':'Containers without @sha256: digest pin. Tag content can change silently.',
  'crds':'Lists all CustomResourceDefinitions. Detects add-on or operator drift across clusters.',
  'resources':'Reports node count, allocatable CPU/memory, and scheduling status.',
  // Fields.
  'git_version':'The full Kubernetes version string reported by the API server (e.g. v1.31.2).',
  'avg_cpu_percent':'Average CPU utilization across all nodes in the cluster, as a percentage of allocatable CPU.',
  'avg_memory_percent':'Average memory utilization across all nodes, as a percentage of allocatable memory.',
  'max_cpu_percent':'Highest CPU utilization on any single node in the cluster.',
  'max_memory_percent':'Highest memory utilization on any single node in the cluster.',
  'healthy_nodes':'Nodes reporting Ready=True with no pressure conditions (MemoryPressure, DiskPressure, PIDPressure all False).',
  'unhealthy_nodes':'Nodes with at least one pressure condition or not in Ready state.',
  'memory_pressure_nodes':'Nodes where kubelet reports MemoryPressure=True. The node is running low on memory and may start evicting pods.',
  'disk_pressure_nodes':'Nodes where kubelet reports DiskPressure=True. Disk space is critically low.',
  'not_ready_nodes':'Nodes not reporting Ready=True. Workloads cannot be scheduled here.',
  'unschedulable_nodes':'Nodes that have been cordoned (spec.unschedulable=true). No new pods will be scheduled.',
  'enforced_count':'Namespaces with a pod-security.kubernetes.io/enforce label set (restricted, baseline, or privileged).',
  'unenforced_count':'Namespaces missing the PSS enforce label. Pods can run with any security context.',
  'namespaces_with_policies':'Namespaces that have at least one NetworkPolicy resource.',
  'namespaces_without_policies':'Namespaces with zero NetworkPolicy resources. All pod-to-pod traffic is unrestricted.',
  'warning_events':'Number of Kubernetes events with type=Warning in this cluster.',
  'quota_count':'Number of ResourceQuota objects across all namespaces.',
  'cluster_role_count':'Number of ClusterRole objects (cluster-wide RBAC permissions).',
  'node_count':'Total number of nodes registered in the cluster.',
  // Severity levels.
  'sev_critical':'Requires immediate attention. May cause outages, security exposure, or data loss if not addressed.',
  'sev_warning':'Should be investigated soon. May indicate drift, missing best practices, or emerging resource pressure.',
  'sev_info':'Informational. No action required. Confirms expected state or notes minor differences.'
};

// Remediation: kubectl commands for each finding type (matched by scanner + keyword in title).
var REMEDIATION={
  'node-health_memory pressure':[
    'kubectl --context {cluster} describe nodes | grep -A5 MemoryPressure',
    'kubectl --context {cluster} top nodes',
    'kubectl --context {cluster} get pods --all-namespaces --sort-by=.status.containerStatuses[0].resources.requests.memory -o wide'
  ],
  'node-health_disk pressure':[
    'kubectl --context {cluster} describe nodes | grep -A5 DiskPressure',
    'kubectl --context {cluster} get pods --all-namespaces -o wide | grep Evicted',
    'kubectl --context {cluster} exec -it <node-debug-pod> -- df -h'
  ],
  'node-health_not ready':[
    'kubectl --context {cluster} get nodes',
    'kubectl --context {cluster} describe node <node-name> | grep -A10 Conditions',
    'kubectl --context {cluster} get events --field-selector involvedObject.kind=Node --sort-by=.lastTimestamp'
  ],
  'version_different':[
    'kubectl --context {cluster} version --short',
    'kubectl --context {cluster} get nodes -o wide'
  ],
  'metrics_memory':[
    'kubectl --context {cluster} top nodes',
    'kubectl --context {cluster} top pods --all-namespaces --sort-by=memory | head -20',
    'kubectl --context {cluster} get pods --all-namespaces -o json | jq \'[.items[] | select(.spec.containers[].resources.requests.memory == null)] | length\''
  ],
  'metrics_cpu':[
    'kubectl --context {cluster} top nodes',
    'kubectl --context {cluster} top pods --all-namespaces --sort-by=cpu | head -20'
  ],
  'security_enforcement':[
    'kubectl --context {cluster} get namespaces -L pod-security.kubernetes.io/enforce',
    'kubectl --context {cluster} label namespace <ns> pod-security.kubernetes.io/enforce=baseline',
    'kubectl --context {cluster} label namespace <ns> pod-security.kubernetes.io/warn=restricted'
  ],
  'network-policies_no network':[
    'kubectl --context {cluster} get networkpolicies --all-namespaces',
    'kubectl --context {cluster} get namespaces -o custom-columns=NAME:.metadata.name',
    'kubectl --context {cluster} apply -f <deny-all-netpol.yaml> -n <namespace>'
  ],
  'resource-quotas_no resource':[
    'kubectl --context {cluster} get resourcequotas --all-namespaces',
    'kubectl --context {cluster} get limitranges --all-namespaces',
    'kubectl --context {cluster} apply -f <resource-quota.yaml> -n <namespace>'
  ],
  'events_warning':[
    'kubectl --context {cluster} get events --all-namespaces --field-selector type=Warning --sort-by=.lastTimestamp | tail -30',
    'kubectl --context {cluster} get events --all-namespaces --field-selector reason=OOMKilling',
    'kubectl --context {cluster} get events --all-namespaces --field-selector reason=FailedScheduling'
  ],
  'namespaces_varies':[
    'kubectl --context {cluster} get namespaces',
    'diff <(kubectl --context cluster-a get ns -o name | sort) <(kubectl --context cluster-b get ns -o name | sort)'
  ],
  'rbac_differs':[
    'kubectl --context {cluster} get clusterroles -o name | sort',
    'kubectl --context {cluster} get clusterrolebindings -o name | sort',
    'diff <(kubectl --context cluster-a get clusterroles -o name | sort) <(kubectl --context cluster-b get clusterroles -o name | sort)'
  ],
  'workload-security_privileged':[
    'kubectl --context {cluster} get pods --all-namespaces -o json | jq \'[.items[] | select(.spec.containers[].securityContext.privileged==true) | .metadata.namespace + "/" + .metadata.name] | unique[]\'',
    'kubectl --context {cluster} get pods --all-namespaces -o json | jq \'.items[] | select(.spec.hostNetwork==true) | .metadata.namespace + "/" + .metadata.name\''
  ],
  'workload-security_host':[
    'kubectl --context {cluster} get pods --all-namespaces -o json | jq \'.items[] | select(.spec.hostNetwork==true or .spec.hostPID==true) | .metadata.namespace + "/" + .metadata.name\''
  ],
  'workload-security_root':[
    'kubectl --context {cluster} get pods --all-namespaces -o json | jq \'[.items[] | select(.spec.containers[].securityContext.runAsNonRoot!=true) | .metadata.namespace + "/" + .metadata.name] | unique[]\''
  ],
  'workload-security_capabilities':[
    'kubectl --context {cluster} get pods --all-namespaces -o json | jq \'[.items[] | select(.spec.containers[].securityContext.capabilities.add!=null) | {pod:(.metadata.namespace+"/"+.metadata.name),caps:.spec.containers[].securityContext.capabilities.add}]\''
  ],
  'rbac-audit_admin':[
    'kubectl --context {cluster} get clusterrolebindings -o json | jq \'.items[] | select(.roleRef.name=="cluster-admin") | {name:.metadata.name,subjects:.subjects[].name}\'',
    'kubectl --context {cluster} auth can-i --list --as=system:serviceaccount:<ns>:<sa>'
  ],
  'rbac-audit_wildcard':[
    'kubectl --context {cluster} get clusterroles -o json | jq \'[.items[] | select(.rules[]?.verbs[]?=="*" or .rules[]?.resources[]?=="*") | .metadata.name]\''
  ],
  'rbac-audit_default':[
    'kubectl --context {cluster} get rolebindings,clusterrolebindings --all-namespaces -o json | jq \'[.items[] | select(.subjects[]? | .name=="default" and .kind=="ServiceAccount") | .metadata.name]\''
  ],
  'image-audit_latest':[
    'kubectl --context {cluster} get pods --all-namespaces -o json | jq \'[.items[].spec.containers[] | select(.image | test(":latest$") or (test(":")|not)) | .image] | unique[]\''
  ],
  'image-audit_digest':[
    'kubectl --context {cluster} get pods --all-namespaces -o json | jq \'[.items[].spec.containers[] | select(.image | test("@sha256:")|not) | .image] | unique[] \' | head -20'
  ]
};

// Legacy remediation lookup. Used as a fallback when a finding lacks the
// server-supplied Remediation block (older scans, third-party scanners).
function getRemediationLegacy(f){
  var key='';
  var t=(f.title||'').toLowerCase();
  if(f.scanner==='node-health'&&t.indexOf('memory pressure')>=0)key='node-health_memory pressure';
  else if(f.scanner==='node-health'&&t.indexOf('disk pressure')>=0)key='node-health_disk pressure';
  else if(f.scanner==='node-health'&&t.indexOf('not ready')>=0)key='node-health_not ready';
  else if(f.scanner==='version')key='version_different';
  else if(f.scanner==='metrics'&&t.indexOf('memory')>=0)key='metrics_memory';
  else if(f.scanner==='metrics'&&t.indexOf('cpu')>=0)key='metrics_cpu';
  else if(f.scanner==='security')key='security_enforcement';
  else if(f.scanner==='network-policies')key='network-policies_no network';
  else if(f.scanner==='resource-quotas')key='resource-quotas_no resource';
  else if(f.scanner==='events')key='events_warning';
  else if(f.scanner==='namespaces')key='namespaces_varies';
  else if(f.scanner==='rbac')key='rbac_differs';
  else if(f.scanner==='workload-security'&&t.indexOf('privileged')>=0)key='workload-security_privileged';
  else if(f.scanner==='workload-security'&&t.indexOf('host')>=0)key='workload-security_host';
  else if(f.scanner==='workload-security'&&t.indexOf('root')>=0)key='workload-security_root';
  else if(f.scanner==='workload-security'&&t.indexOf('capabilit')>=0)key='workload-security_capabilities';
  else if(f.scanner==='rbac-audit'&&t.indexOf('cluster-admin')>=0)key='rbac-audit_admin';
  else if(f.scanner==='rbac-audit'&&t.indexOf('wildcard')>=0)key='rbac-audit_wildcard';
  else if(f.scanner==='rbac-audit'&&t.indexOf('default')>=0)key='rbac-audit_default';
  else if(f.scanner==='image-audit'&&t.indexOf('latest')>=0)key='image-audit_latest';
  else if(f.scanner==='image-audit'&&t.indexOf('digest')>=0)key='image-audit_digest';
  if(!key)return null;
  var cmds=REMEDIATION[key];
  if(!cmds)return null;
  var cluster=f.cluster||'{cluster}';
  return cmds.map(function(c){return c.replace(/\{cluster\}/g,cluster)});
}

// Tooltip system: JS-positioned, viewport-aware.
(function(){
  var el=document.getElementById('tip-el'),timer=null;
  document.addEventListener('mouseover',function(e){
    var t=e.target.closest('[data-tip]');
    if(!t||!t.dataset.tip)return;
    clearTimeout(timer);
    el.textContent=t.dataset.tip;
    el.style.display='block';
    var r=t.getBoundingClientRect();
    var tw=el.offsetWidth,th=el.offsetHeight;
    var left=r.left+r.width/2-tw/2;
    var top=r.top-th-8;
    if(left<8)left=8;
    if(left+tw>window.innerWidth-8)left=window.innerWidth-tw-8;
    if(top<8){top=r.bottom+8}
    el.style.left=left+'px';
    el.style.top=top+'px';
  });
  document.addEventListener('mouseout',function(e){
    var t=e.target.closest('[data-tip]');
    if(!t)return;
    timer=setTimeout(function(){el.style.display='none'},80);
  });
})();

  h+='<span class="tag finding-ack-btn" style="background:rgba(139,148,158,.08);color:var(--t3);cursor:pointer;margin-left:auto" data-tip="Acknowledge this finding; it will dim and stop firing Slack notifications" onclick="event.stopPropagation();ackFinding(this.closest(\'.fi\'))">ack</span>';
  h+='</div>';

  h+='<div style="font-size:12px;color:var(--t2);line-height:1.3;margin-top:2px">'+esc(f.description)+'</div>';

  if(f.affected&&f.affected.length){

    h+=f.affected.slice(0,8).map(function(a){return '<code class="mono" style="background:var(--c2);padding:1px 4px;border-radius:3px;font-size:10px">'+esc(a)+'</code>'}).join(' ');

    h+='</div>';
  }
  // Remediation: prefer the server-supplied parameterized command, fall back to the
  // legacy lookup. The copy button is wired by a delegated handler at the page level.
  var rem=getRemediation(f);
  if(rem&&rem.length&&f.severity!=='info'){
    h+='<div class="remediation-wrap" style="position:relative;margin-top:4px">';
    h+='<button class="btn copy-btn" data-copy="'+esc(rem.join('\n'))+'" style="position:absolute;top:4px;right:4px;font-size:9px;padding:2px 6px;z-index:1">Copy</button>';

    rem.forEach(function(cmd){h+=esc(cmd)+'\n'});

    if(f.remediation&&f.remediation.yaml){

      h+='<div class="remediation-wrap" style="position:relative;margin-top:4px">';

      h+='<div class="remediation">'+esc(f.remediation.yaml)+'</div>';
      h+='</div></details>';
    }
    h+='</div>';
  }
  h+='</div></div>';
  return h;
}

// getRemediationFromFinding pulls remediation commands from the server-supplied
// Remediation block. Falls back to the legacy static REMEDIATION lookup when the
// finding does not carry one.
function getRemediation(f){
  if(f.remediation&&f.remediation.command){
    return [f.remediation.command];
  }
  return getRemediationLegacy(f);
}

async function renderDash(){
  renderBar('<span class="btn btn-ok" onclick="triggerScan()">Trigger scan</span>');
  // Pull the latest two scans so we can compute a scan-over-scan delta on
  // the Fleet Score. The second fetch is best-effort: if it fails or the
  // previous report has no score, the hero just omits the delta.
  var scans=await api('/scans?limit=2');
  if(!scans||!scans.length)return '<div class="empty">No scans yet. Run a scan first.</div>';
  var rpt=await api('/scans/'+scans[0].id+'/report');
  var prevScore=null,prevTs=null;

    try{
      var prevRpt=await api('/scans/'+scans[1].id+'/report');

        prevScore=prevRpt.fleet_score.score;
        prevTs=scans[1].timestamp;
      }
    }catch(_){}
  }
  // Forecast fetch is best-effort and non-blocking. Hidden when the API
  // marks it as insufficient.
  var forecast=null;

        h+='</div>';
      });
      h+='</div></details>';
    });
  }

  // Charts row.
  h+='<h3 id="dash-util">Resource utilization</h3><div class="g g2">';
  h+='<div class="chc"><h4>CPU utilization by cluster</h4><canvas id="dashCpu"></canvas></div>';
  h+='<div class="chc"><h4>Memory utilization by cluster</h4><canvas id="dashMem"></canvas></div>';
  h+='</div>';

  // Top findings grouped by severity.
  if(rpt.findings&&rpt.findings.length){
    var critFindings=rpt.findings.filter(function(f){return f.severity==='critical'});
    var warnFindings=rpt.findings.filter(function(f){return f.severity==='warning'});

    }
  }

  // Three async panels populated after the main render. Placeholders go in
  // now so layout doesn't shift; the panels fetch their data lazily and
  // populate when ready. Each handles its own empty/error state.
  h+='<div id="dashForecastPanel"></div>';

// renderFleetScoreHero builds the single-number hero card at the top of the
// dashboard. Accepts the current FleetScore object, the previous scan's
// numeric score (or null), the previous scan's timestamp string (or null)
// for the delta caption, and an optional forecast object from
// /api/forecast/fleet-score.
function renderFleetScoreHero(fs,prevScore,prevTs,forecast){
  if(!fs||typeof fs.score!=='number')return '';
  var gradeColors={A:'var(--ok)',B:'var(--ok)',C:'var(--wn)',D:'var(--cr)',F:'var(--cr)'};
  var gc=gradeColors[fs.grade]||'var(--t2)';
  var scoreColor=fs.score>=80?'var(--ok)':fs.score>=60?'var(--wn)':'var(--cr)';

  // Delta chip: up/down vs previous scan when we have it.
  var deltaHTML='';

    '<text x="60" y="57" text-anchor="middle" fill="var(--tx)" font-size="32" font-weight="700">'+fs.score+'</text>'+
    '<text x="60" y="78" text-anchor="middle" fill="'+gc+'" font-size="15" font-weight="700" letter-spacing="1">'+esc(fs.grade)+'</text>'+
    '</svg>';
  return '<div class="cd" style="margin-bottom:14px;border:1px solid var(--bd);padding:18px 22px" data-tour="fleet-score">'+
    '<div style="display:flex;align-items:center;gap:24px;flex-wrap:wrap">'+

// ackFinding posts an acknowledgement for the finding represented by the
// .fi container element, then dims the finding in place. The fingerprint is
// computed client-side from cluster + scanner + title using SubtleCrypto so
// the server does not have to echo it on every finding payload.
async function ackFinding(el){
  if(!el)return;
  var fpKey=el.getAttribute('data-fpkey')||'';
  var reason=prompt('Reason (optional):','')||'';
  try{
    var fp=await sha256Hex(fpKey);
    var cluster=el.getAttribute('data-cluster')||'';
    var title=(el.querySelector('div[style*="font-size:13px"]')||{}).textContent||'';
    var titleNode=el.querySelector('div[style*="font-size:13px"]');
    var titleText=titleNode?titleNode.textContent.trim():'';
    var scannerLabelNode=el.querySelectorAll('.tag')[1];
    var scannerLabel=scannerLabelNode?scannerLabelNode.textContent.trim():'';
    var headers={'Content-Type':'application/json'};
    if(window._authToken)headers['Authorization']='Bearer '+window._authToken;
    var resp=await fetch('/api/findings/'+fp+'/ack',{
      method:'POST',
      headers:headers,
      body:JSON.stringify({cluster:cluster,scanner:scannerLabel,title:titleText,reason:reason}),
    });
    if(resp.ok||resp.status===201){
      el.style.opacity='0.45';
      var ackTag=el.querySelector('.finding-ack-btn');
      if(ackTag){ackTag.textContent='acked';ackTag.style.color='var(--ok)';}
    }else if(resp.status===403){
      alert('Server requires --auth-token; ack endpoints are mutating.');
    }else{
      alert('Ack failed: '+resp.status);
    }
  }catch(e){
    alert('Ack error: '+e.message);
  }
}

// sha256Hex returns the lowercase hex SHA-256 of s. Used to compute the
// finding fingerprint client-side so the API URL matches the server's.
async function sha256Hex(s){
  var enc=new TextEncoder();
  var buf=await crypto.subtle.digest('SHA-256',enc.encode(s));
  return Array.from(new Uint8Array(buf)).map(function(b){
    return b.toString(16).padStart(2,'0');
  }).join('');
}

// loadForecastPanel populates #dashForecastPanel with the per-cluster forecast
// list, sorted worst-trending first. Hidden when no clusters or none are
// sufficient. Best-effort: a fetch failure leaves the panel empty.
function loadForecastPanel(){
  var el=document.getElementById('dashForecastPanel');
  if(!el)return;
  api('/forecast/clusters').then(function(d){
    if(!d||!d.forecasts||!d.forecasts.length)return;
    var rows=d.forecasts.filter(function(f){return f.forecast&&f.forecast.sufficient});
    if(!rows.length)return;
    // Show only worsening (negative delta) or near-flat with a low score.
    rows=rows.filter(function(r){
      var delta=r.forecast.predicted-r.current_score;
      return delta<0||(r.current_score<80&&Math.abs(delta)<3);
    }).slice(0,6);
    if(!rows.length)return;
    var h='<h3>Most likely to degrade <span style="font-size:10px;color:var(--t3);text-transform:none;letter-spacing:0">(linear projection, last '+(rows[0].forecast.basis||'?')+' scans)</span></h3>';

    h+='<thead><tr><th>Cluster</th><th>Now</th><th>Projected</th><th>Delta</th><th>R²</th><th>Headline</th></tr></thead><tbody>';
    rows.forEach(function(r){
      var delta=r.forecast.predicted-r.current_score;
      var dc=delta<0?'var(--cr)':delta>0?'var(--ok)':'var(--t2)';
      var sign=delta>0?'+':'';

// fmtUSD formats a number as a US-style currency string with thousands
// separators and exactly two decimals.
function fmtUSD(n){
  if(typeof n!=='number'||isNaN(n))return '0.00';
  var s=Math.abs(n).toFixed(2);
  var parts=s.split('.');
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return (n<0?'-':'')+parts.join('.');
}

// humanAgo formats an ISO-8601 timestamp as a short "Nm ago" / "Nh ago" string
// suitable for inline use in chips. Falls back to the raw string on parse.
function humanAgo(iso){
  var t=Date.parse(iso);
  if(isNaN(t))return iso;
  var s=Math.max(0,Math.round((Date.now()-t)/1000));
  if(s<60)return s+'s ago';
  var m=Math.round(s/60);
  if(m<60)return m+'m ago';
  var hr=Math.round(m/60);
  if(hr<48)return hr+'h ago';
  var d=Math.round(hr/24);
  return d+'d ago';
}

// === CLUSTER DETAIL ===
async function renderDetail(){
  renderBar('<span class="btn btn-ac" onclick="exportClusterCSV()">Export all data</span> <span class="btn" onclick="exportClusterEvents()">Export events</span>');
  var c=P.cluster;
  var data=await api('/clusters/'+encodeURIComponent(c)+'/detail');
  var sd=data.scanner_data||{};
  var ch=data.health;
  var h='<span class="back" onclick="nav(\'dash\')">&larr; Back to dashboard</span>';
  h+='<h2>'+esc(c)+'</h2>';

  // Status bar.
  if(ch){
    var color=ch.status==='critical'?'var(--cr)':ch.status==='degraded'?'var(--wn)':'var(--ok)';
    h+='<p class="sub" style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+color+'"></span><b>'+ch.status+'</b> &middot; '+esc(ch.kubernetes_version)+' &middot; '+ch.node_count+' nodes &middot; CPU '+pct(ch.avg_cpu)+' &middot; Mem '+pct(ch.avg_memory)+' &middot; '+ch.warning_events+' warning events</p>';
  }

  // Gauges.
  if(ch){
    h+='<div class="g" style="grid-template-columns:repeat(4,1fr)">';
    h+='<div class="chc"><h4>CPU</h4><canvas id="detCpu" height="120"></canvas></div>';
    h+='<div class="chc"><h4>Memory</h4><canvas id="detMem" height="120"></canvas></div>';
    h+='<div class="chc"><h4>Nodes</h4><canvas id="detNodes" height="120"></canvas></div>';
    h+='<div class="chc"><h4>Security posture</h4><canvas id="detSec" height="120"></canvas></div>';
    h+='</div>';
  }

  // Findings.
  if(data.findings&&data.findings.length){
    h+='<h3 data-tour="findings-list">Findings ('+data.findings.length+')</h3>';
    data.findings.forEach(function(f){h+=renderFinding(f)});
  }

  // === SECTIONS ===
  // hasProblem: auto-open sections with issues.
  function sec(title,id,content,hasProblem){
    var open=hasProblem?' open':'';
    var chevStyle=hasProblem?' style="transform:rotate(90deg)"':'';
    return '<div class="dsec'+open+'" id="dsec-'+id+'"><div class="dsec-h" onclick="this.parentElement.classList.toggle(\'open\')"><h4>'+title+'</h4><span class="chev"'+chevStyle+'>&#9654;</span></div><div class="dsec-b">'+content+'</div></div>';
  }

  // Version.
  if(sd.version){
    var v=sd.version;
    h+=sec('Kubernetes Version','version','<div class="g g6"><div class="cd st"><div class="v" style="color:var(--ac)">'+esc(v.git_version)+'</div><div class="l">Version</div></div><div class="cd st"><div class="v">'+esc(v.platform)+'</div><div class="l">Platform</div></div></div>');
  }

  // Node health.
  if(sd['node-health']){
    var nh=sd['node-health'];
    var nhc='<div class="g g6" style="margin-bottom:10px">';
    nhc+='<div class="cd st" data-tip="'+esc(TIPS.healthy_nodes)+'"><div class="v" style="color:var(--ok)">'+nh.healthy_nodes+'</div><div class="l">Healthy</div></div>';
    nhc+='<div class="cd st" data-tip="'+esc(TIPS.unhealthy_nodes)+'"><div class="v" style="color:'+(nh.unhealthy_nodes?'var(--cr)':'var(--ok)')+'">'+nh.unhealthy_nodes+'</div><div class="l">Unhealthy</div></div>';
    nhc+='<div class="cd st" data-tip="'+esc(TIPS.memory_pressure_nodes)+'"><div class="v" style="color:'+(nh.memory_pressure_nodes?'var(--cr)':'var(--ok)')+'">'+nh.memory_pressure_nodes+'</div><div class="l">Mem pressure</div></div>';
    nhc+='<div class="cd st" data-tip="'+esc(TIPS.disk_pressure_nodes)+'"><div class="v" style="color:'+(nh.disk_pressure_nodes?'var(--cr)':'var(--ok)')+'">'+nh.disk_pressure_nodes+'</div><div class="l">Disk pressure</div></div>';
    nhc+='<div class="cd st" data-tip="'+esc(TIPS.not_ready_nodes)+'"><div class="v" style="color:'+(nh.not_ready_nodes?'var(--cr)':'var(--ok)')+'">'+nh.not_ready_nodes+'</div><div class="l">Not ready</div></div>';
    nhc+='<div class="cd st" data-tip="'+esc(TIPS.unschedulable_nodes)+'"><div class="v" style="color:'+(nh.unschedulable_nodes?'var(--wn)':'var(--ok)')+'">'+nh.unschedulable_nodes+'</div><div class="l">Cordoned</div></div>';
    nhc+='</div>';
    if(nh.nodes&&nh.nodes.length){
      nhc+='<table><thead><tr><th>Node</th><th>Ready</th><th>Mem pressure</th><th>Disk pressure</th><th>PID pressure</th><th>Net unavailable</th><th>Cordoned</th></tr></thead><tbody>';
      nh.nodes.forEach(function(n){
        nhc+='<tr><td style="font-weight:500" class="mono">'+esc(n.name)+'</td>';
        nhc+='<td style="color:'+(n.ready?'var(--ok)':'var(--cr)')+'">'+n.ready+'</td>';
        nhc+='<td style="color:'+(n.memory_pressure?'var(--cr)':'var(--ok)')+'">'+n.memory_pressure+'</td>';
        nhc+='<td style="color:'+(n.disk_pressure?'var(--cr)':'var(--ok)')+'">'+n.disk_pressure+'</td>';
        nhc+='<td style="color:'+(n.pid_pressure?'var(--cr)':'var(--ok)')+'">'+n.pid_pressure+'</td>';
        nhc+='<td style="color:'+(n.network_unavailable?'var(--cr)':'var(--ok)')+'">'+n.network_unavailable+'</td>';
        nhc+='<td style="color:'+(n.unschedulable?'var(--wn)':'var(--ok)')+'">'+n.unschedulable+'</td></tr>';
      });
      nhc+='</tbody></table>';
    }
    h+=sec('Node Health ('+nh.node_count+' nodes)','node-health',nhc,nh.unhealthy_nodes>0);
  }

  // Metrics.
  if(sd.metrics&&sd.metrics.available){
    var m=sd.metrics;
    var mc='<div class="g g6">';
    mc+='<div class="cd st" data-tip="'+esc(TIPS.avg_cpu_percent)+'"><div class="v" style="color:'+threshColor(m.avg_cpu_percent)+'">'+Math.round(m.avg_cpu_percent)+'%</div><div class="l">Avg CPU</div></div>';
    mc+='<div class="cd st" data-tip="'+esc(TIPS.max_cpu_percent)+'"><div class="v" style="color:'+threshColor(m.max_cpu_percent)+'">'+Math.round(m.max_cpu_percent)+'%</div><div class="l">Peak CPU ('+esc(m.max_cpu_node)+')</div></div>';
    mc+='<div class="cd st" data-tip="'+esc(TIPS.avg_memory_percent)+'"><div class="v" style="color:'+threshColor(m.avg_memory_percent)+'">'+Math.round(m.avg_memory_percent)+'%</div><div class="l">Avg Mem</div></div>';
    mc+='<div class="cd st" data-tip="'+esc(TIPS.max_memory_percent)+'"><div class="v" style="color:'+threshColor(m.max_memory_percent)+'">'+Math.round(m.max_memory_percent)+'%</div><div class="l">Peak Mem ('+esc(m.max_memory_node)+')</div></div>';
    mc+='</div>';
    if(m.nodes&&m.nodes.length){
      mc+='<table><thead><tr><th>Node</th><th>CPU usage</th><th>CPU %</th><th>Memory usage</th><th>Memory %</th></tr></thead><tbody>';
      m.nodes.forEach(function(n){
        mc+='<tr><td style="font-weight:500" class="mono">'+esc(n.name)+'</td>';
        mc+='<td class="mono">'+esc(n.cpu_usage)+'</td>';
        mc+='<td class="mono" style="color:'+threshColor(n.cpu_percent)+'">'+(n.cpu_percent>=0?Math.round(n.cpu_percent)+'%':'N/A')+'</td>';
        mc+='<td class="mono">'+esc(n.memory_usage)+'</td>';
        mc+='<td class="mono" style="color:'+threshColor(n.memory_percent)+'">'+(n.memory_percent>=0?Math.round(n.memory_percent)+'%':'N/A')+'</td></tr>';
      });
      mc+='</tbody></table>';
    }
    h+=sec('Resource Utilization','metrics',mc,m.avg_memory_percent>70||m.avg_cpu_percent>70);
  }

  // Resources.
  if(sd.resources){
    var r=sd.resources;
    var rc='<div class="g g6">';
    rc+='<div class="cd st"><div class="v">'+r.node_count+'</div><div class="l">Nodes</div></div>';
    rc+='<div class="cd st"><div class="v">'+r.ready_nodes+'</div><div class="l">Ready</div></div>';
    rc+='<div class="cd st"><div class="v">'+esc(r.total_allocatable_cpu)+'</div><div class="l">Total CPU</div></div>';
    rc+='<div class="cd st"><div class="v">'+esc(r.total_allocatable_memory)+'</div><div class="l">Total memory</div></div>';
    rc+='</div>';
    if(r.nodes&&r.nodes.length){
      rc+='<table><thead><tr><th>Node</th><th>Alloc. CPU</th><th>Alloc. memory</th><th>Capacity CPU</th><th>Capacity memory</th><th>Cordoned</th></tr></thead><tbody>';
      r.nodes.forEach(function(n){
        rc+='<tr><td class="mono" style="font-weight:500">'+esc(n.name)+'</td><td class="mono">'+esc(n.allocatable_cpu)+'</td><td class="mono">'+esc(n.allocatable_memory)+'</td><td class="mono">'+esc(n.capacity_cpu)+'</td><td class="mono">'+esc(n.capacity_memory)+'</td><td style="color:'+(n.unschedulable?'var(--wn)':'var(--ok)')+'">'+n.unschedulable+'</td></tr>';
      });
      rc+='</tbody></table>';
    }
    h+=sec('Node Resources','resources',rc);
  }

  // Events.
  if(sd.events){
    var ev=sd.events;
    var ec='<div class="g g3" style="margin-bottom:10px"><div class="cd st"><div class="v">'+ev.total_events+'</div><div class="l">Total events</div></div><div class="cd st"><div class="v" style="color:'+(ev.warning_events>50?'var(--cr)':ev.warning_events>0?'var(--wn)':'var(--ok)')+'">'+ev.warning_events+'</div><div class="l">Warnings</div></div><div class="cd st"><div class="v" style="color:var(--ok)">'+ev.normal_events+'</div><div class="l">Normal</div></div></div>';
    if(ev.top_warning_reasons&&ev.top_warning_reasons.length){
      ec+='<h4 style="font-size:12px;margin:8px 0 4px">Top warning reasons</h4>';
      ec+='<table><thead><tr><th>Reason</th><th data-tip="Total occurrences across all events with this reason">Total count</th><th data-tip="Number of distinct event objects">Distinct events</th></tr></thead><tbody>';
      ev.top_warning_reasons.forEach(function(r){
        ec+='<tr><td style="font-weight:500;color:var(--wn)">'+esc(r.reason)+'</td><td class="mono">'+r.count+'</td><td class="mono">'+r.event_count+'</td></tr>';
      });
      ec+='</tbody></table>';
    }
    if(ev.recent_warnings&&ev.recent_warnings.length){
      ec+='<h4 style="font-size:12px;margin:12px 0 4px">Recent warning events ('+ev.recent_warnings.length+')</h4>';
      ec+='<input type="search" id="evSearch" placeholder="Filter events..." style="margin-bottom:6px;background:var(--c2);border:1px solid var(--bd);border-radius:5px;padding:4px 8px;color:var(--tx);font-size:11px;width:200px">';
      ec+='<div class="tw"><table id="evTable"><thead><tr><th>Namespace</th><th>Kind</th><th>Object</th><th>Reason</th><th>Message</th><th>Count</th><th>Last seen</th></tr></thead><tbody>';
      ev.recent_warnings.forEach(function(e){
        var txt=[e.namespace,e.kind,e.involved_object,e.reason,e.message].join(' ').toLowerCase();
        ec+='<tr data-evtext="'+esc(txt)+'"><td class="mono">'+esc(e.namespace)+'</td><td>'+esc(e.kind)+'</td><td class="mono">'+esc(e.involved_object)+'</td><td style="color:var(--wn);font-weight:500">'+esc(e.reason)+'</td><td style="max-width:350px;font-size:11px;color:var(--t2)">'+esc(e.message)+'</td><td class="mono">'+e.count+'</td><td class="mono" style="white-space:nowrap">'+esc(e.last_seen)+'</td></tr>';
      });
      ec+='</tbody></table></div>';
    }
    h+=sec('Events','events',ec,ev.warning_events>20);
  }

  // Security.
  if(sd.security){
    var s=sd.security;
    var sc2='<div class="g g3" style="margin-bottom:10px">';
    sc2+='<div class="cd st" data-tip="'+esc(TIPS.enforced_count)+'"><div class="v" style="color:var(--ok)">'+(s.enforced_count||0)+'</div><div class="l">PSS enforced</div></div>';
    sc2+='<div class="cd st" data-tip="'+esc(TIPS.unenforced_count)+'"><div class="v" style="color:'+(s.unenforced_count?'var(--wn)':'var(--ok)')+'">'+s.unenforced_count+'</div><div class="l">Unenforced</div></div>';
    sc2+='<div class="cd st"><div class="v">'+s.namespace_count+'</div><div class="l">Namespaces</div></div>';
    sc2+='</div>';
    if(s.namespaces&&s.namespaces.length){
      sc2+='<table><thead><tr><th>Namespace</th><th data-tip="Pod Security Standards enforce level">Enforce</th><th>Enforce version</th><th data-tip="Audit mode level">Audit</th><th data-tip="Warning mode level">Warn</th></tr></thead><tbody>';
      s.namespaces.forEach(function(ns){
        var eColor=ns.enforce?'var(--ok)':'var(--wn)';
        sc2+='<tr><td style="font-weight:500" class="mono">'+esc(ns.namespace)+'</td>';
        sc2+='<td style="color:'+eColor+'">'+(ns.enforce||'none')+'</td>';
        sc2+='<td class="mono">'+(ns.enforce_version||'')+'</td>';
        sc2+='<td>'+(ns.audit||'')+'</td>';
        sc2+='<td>'+(ns.warn||'')+'</td></tr>';
      });
      sc2+='</tbody></table>';
    }
    h+=sec('Pod Security Standards','security',sc2,s.unenforced_count>0);
  }

  // Network policies.
  if(sd['network-policies']){
    var np=sd['network-policies'];
    var npc='<div class="g g3" style="margin-bottom:10px">';
    npc+='<div class="cd st"><div class="v">'+np.count+'</div><div class="l">Policies</div></div>';
    npc+='<div class="cd st" data-tip="'+esc(TIPS.namespaces_with_policies)+'"><div class="v" style="color:var(--ok)">'+np.namespaces_with_policies+'</div><div class="l">Covered namespaces</div></div>';
    npc+='<div class="cd st" data-tip="'+esc(TIPS.namespaces_without_policies)+'"><div class="v" style="color:'+(np.namespaces_without_policies?'var(--wn)':'var(--ok)')+'">'+np.namespaces_without_policies+'</div><div class="l">Uncovered namespaces</div></div>';
    npc+='</div>';
    if(np.policies&&np.policies.length){
      npc+='<table><thead><tr><th>Namespace</th><th>Policy name</th><th data-tip="Ingress, Egress, or both">Types</th><th>Ingress rules</th><th>Egress rules</th></tr></thead><tbody>';
      np.policies.forEach(function(p){
        npc+='<tr><td class="mono">'+esc(p.namespace)+'</td><td style="font-weight:500" class="mono">'+esc(p.name)+'</td><td>'+(p.policy_types?p.policy_types.join(', '):'')+'</td><td class="mono">'+p.ingress_rule_count+'</td><td class="mono">'+p.egress_rule_count+'</td></tr>';
      });
      npc+='</tbody></table>';
    }
    h+=sec('Network Policies','network-policies',npc,np.namespaces_without_policies>0);
  }

  // RBAC.
  if(sd.rbac){
    var rb=sd.rbac;
    var rbc='<div class="g g6" style="margin-bottom:10px">';
    rbc+='<div class="cd st"><div class="v">'+rb.cluster_role_count+'</div><div class="l">ClusterRoles</div></div>';
    rbc+='<div class="cd st"><div class="v">'+rb.role_count+'</div><div class="l">Roles</div></div>';
    rbc+='<div class="cd st"><div class="v">'+rb.cluster_role_binding_count+'</div><div class="l">ClusterRoleBindings</div></div>';
    rbc+='<div class="cd st"><div class="v">'+rb.role_binding_count+'</div><div class="l">RoleBindings</div></div>';
    rbc+='</div>';
    if(rb.roles&&rb.roles.length){
      rbc+='<h4 style="font-size:12px;margin:8px 0 4px">Roles ('+rb.roles.length+')</h4>';
      rbc+='<table><thead><tr><th>Kind</th><th>Namespace</th><th>Name</th><th data-tip="Number of RBAC policy rules">Rules</th></tr></thead><tbody>';
      rb.roles.forEach(function(r){
        rbc+='<tr><td>'+esc(r.kind)+'</td><td class="mono">'+(r.namespace||'cluster-wide')+'</td><td style="font-weight:500" class="mono">'+esc(r.name)+'</td><td class="mono">'+r.rule_count+'</td></tr>';
      });
      rbc+='</tbody></table>';
    }
    if(rb.bindings&&rb.bindings.length){
      rbc+='<h4 style="font-size:12px;margin:12px 0 4px">Bindings ('+rb.bindings.length+')</h4>';
      rbc+='<table><thead><tr><th>Kind</th><th>Namespace</th><th>Name</th><th>Role ref</th><th data-tip="Number of subjects (users, groups, service accounts) bound">Subjects</th></tr></thead><tbody>';
      rb.bindings.forEach(function(b){
        rbc+='<tr><td>'+esc(b.kind)+'</td><td class="mono">'+(b.namespace||'cluster-wide')+'</td><td style="font-weight:500" class="mono">'+esc(b.name)+'</td><td class="mono">'+esc(b.role_ref)+'</td><td class="mono">'+b.subject_count+'</td></tr>';
      });
      rbc+='</tbody></table>';
    }
    h+=sec('RBAC','rbac',rbc);
  }

  // Namespaces.
  if(sd.namespaces){
    var ns=sd.namespaces;
    var nsc='<div class="cd st" style="display:inline-block;margin-bottom:10px"><div class="v">'+ns.count+'</div><div class="l">Namespaces</div></div>';
    if(ns.names&&ns.names.length){
      nsc+='<table><thead><tr><th>Namespace</th><th>Labels</th></tr></thead><tbody>';
      ns.names.forEach(function(n){
        var lbls=ns.labels&&ns.labels[n]?Object.entries(ns.labels[n]).map(function(e){return e[0]+'='+e[1]}).join(', '):'';
        nsc+='<tr><td style="font-weight:500" class="mono">'+esc(n)+'</td><td style="font-size:11px;color:var(--t2)">'+(lbls||'none')+'</td></tr>';
      });
      nsc+='</tbody></table>';
    }
    h+=sec('Namespaces ('+ns.count+')','namespaces',nsc);
  }

  // Services.
  if(sd.services){
    var sv=sd.services;
    var svc='<div class="cd st" style="display:inline-block;margin-bottom:10px"><div class="v">'+sv.count+'</div><div class="l">Services</div></div>';
    if(sv.services&&sv.services.length){
      svc+='<table><thead><tr><th>Namespace</th><th>Name</th><th>Type</th><th>Ports</th></tr></thead><tbody>';
      sv.services.forEach(function(s){
        var ports=(s.ports||[]).map(function(p){return(p.name?p.name+':':'')+p.port+'/'+p.protocol}).join(', ');
        svc+='<tr><td class="mono">'+esc(s.namespace)+'</td><td style="font-weight:500" class="mono">'+esc(s.name)+'</td><td>'+esc(s.type)+'</td><td class="mono" style="font-size:11px">'+esc(ports)+'</td></tr>';
      });
      svc+='</tbody></table>';
    }
    h+=sec('Services ('+sv.count+')','services',svc);
  }

  // Ingresses.
  if(sd.ingresses){
    var ig=sd.ingresses;
    var igc='<div class="cd st" style="display:inline-block;margin-bottom:10px"><div class="v">'+ig.count+'</div><div class="l">Ingresses</div></div>';
    if(ig.ingresses&&ig.ingresses.length){
      igc+='<table><thead><tr><th>Namespace</th><th>Name</th><th>Class</th><th>Hosts</th><th>TLS</th></tr></thead><tbody>';
      ig.ingresses.forEach(function(i){
        igc+='<tr><td class="mono">'+esc(i.namespace)+'</td><td style="font-weight:500" class="mono">'+esc(i.name)+'</td><td>'+esc(i.ingress_class_name||'default')+'</td><td class="mono" style="font-size:11px">'+(i.hosts?i.hosts.join(', '):'')+'</td><td style="color:'+(i.tls?'var(--ok)':'var(--wn)')+'">'+(i.tls?'yes':'no')+'</td></tr>';
      });
      igc+='</tbody></table>';
    }
    h+=sec('Ingresses ('+ig.count+')','ingresses',igc);
  }

  // Resource quotas.
  if(sd['resource-quotas']){
    var rq=sd['resource-quotas'];
    var rqc='<div class="g g3" style="margin-bottom:10px"><div class="cd st"><div class="v">'+rq.quota_count+'</div><div class="l">Quotas</div></div><div class="cd st"><div class="v">'+rq.limit_range_count+'</div><div class="l">Limit ranges</div></div><div class="cd st"><div class="v">'+rq.namespaces_with_quotas+'</div><div class="l">NS with quotas</div></div></div>';
    if(rq.quotas&&rq.quotas.length){
      rqc+='<table><thead><tr><th>Namespace</th><th>Name</th><th>Hard limits</th><th>Current usage</th></tr></thead><tbody>';
      rq.quotas.forEach(function(q){
        var hard=q.hard?Object.entries(q.hard).map(function(e){return e[0]+': '+e[1]}).join(', '):'';
        var used=q.used?Object.entries(q.used).map(function(e){return e[0]+': '+e[1]}).join(', '):'';
        rqc+='<tr><td class="mono">'+esc(q.namespace)+'</td><td style="font-weight:500" class="mono">'+esc(q.name)+'</td><td style="font-size:11px">'+esc(hard)+'</td><td style="font-size:11px;color:var(--t2)">'+esc(used)+'</td></tr>';
      });
      rqc+='</tbody></table>';
    }
    h+=sec('Resource Quotas','resource-quotas',rqc);
  }

  // CRDs.
  if(sd.crds){
    var cr=sd.crds;
    var crc='<div class="cd st" style="display:inline-block;margin-bottom:10px"><div class="v">'+cr.count+'</div><div class="l">CRDs</div></div>';
    if(cr.crds&&cr.crds.length){
      crc+='<table><thead><tr><th>Name</th><th>Group</th><th>Versions</th><th data-tip="Namespaced or Cluster scope">Scope</th></tr></thead><tbody>';
      cr.crds.forEach(function(c){
        crc+='<tr><td style="font-weight:500" class="mono">'+esc(c.name)+'</td><td class="mono">'+esc(c.group)+'</td><td class="mono">'+(c.versions?c.versions.join(', '):'')+'</td><td>'+esc(c.scope)+'</td></tr>';
      });
      crc+='</tbody></table>';
    }
    h+=sec('Custom Resource Definitions ('+cr.count+')','crds',crc);
  }

  window._clusterDetail=data;

  return {html:h,post:function(){
    // Event search filter.
    var evs=document.getElementById('evSearch');
    if(evs){evs.oninput=function(){
      var q=evs.value.toLowerCase();
      document.querySelectorAll('#evTable tbody tr').forEach(function(r){
        r.style.display=(!q||r.dataset.evtext.indexOf(q)>=0)?'':'none';
      });
    }}

    if(!ch||typeof Chart==='undefined')return;
    Chart.defaults.color='#8b949e';
    function gauge(id,val,label,c1,c2){
      makeChart(id,{type:'doughnut',data:{labels:[label,'Free'],datasets:[{data:[val,100-val],backgroundColor:[c1,'#21262d'],borderWidth:0}]},options:{cutout:'72%',plugins:{legend:{display:false},tooltip:{enabled:true}},animation:{animateRotate:true}},plugins:[{id:'g_'+id,afterDraw:function(chart){var ctx=chart.ctx,w=chart.width/2,ht=chart.height/2+8;ctx.save();ctx.textAlign='center';ctx.fillStyle='#e6edf3';ctx.font='bold 22px -apple-system,sans-serif';ctx.fillText(Math.round(val)+'%',w,ht);ctx.font='11px -apple-system,sans-serif';ctx.fillStyle='#8b949e';ctx.fillText(label,w,ht+16);ctx.restore()}}]});
    }
    gauge('detCpu',ch.avg_cpu,'CPU',threshColor(ch.avg_cpu));
    gauge('detMem',ch.avg_memory,'Memory',threshColor(ch.avg_memory));
    // Node health donut.
    makeChart('detNodes',{type:'doughnut',data:{labels:['Healthy','Unhealthy'],datasets:[{data:[ch.healthy_nodes,ch.node_count-ch.healthy_nodes],backgroundColor:['#3fb950','#f85149'],borderWidth:0}]},options:{cutout:'72%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:6}},tooltip:{enabled:true}}},plugins:[{id:'gn',afterDraw:function(chart){var ctx=chart.ctx,w=chart.width/2,ht=chart.height/2;ctx.save();ctx.textAlign='center';ctx.fillStyle='#e6edf3';ctx.font='bold 20px -apple-system,sans-serif';ctx.fillText(ch.healthy_nodes+'/'+ch.node_count,w,ht);ctx.font='11px -apple-system,sans-serif';ctx.fillStyle='#8b949e';ctx.fillText('Nodes',w,ht+14);ctx.restore()}}]});
    // Security posture donut.
    var enf=sd.security?sd.security.enforced_count||0:0;
    var unenf=sd.security?sd.security.unenforced_count||0:0;
    if(enf+unenf>0){
      makeChart('detSec',{type:'doughnut',data:{labels:['Enforced','Unenforced'],datasets:[{data:[enf,unenf],backgroundColor:['#3fb950',unenf?'#d29922':'#3fb950'],borderWidth:0}]},options:{cutout:'72%',plugins:{legend:{position:'bottom',labels:{boxWidth:10,padding:6}},tooltip:{enabled:true}}},plugins:[{id:'gs',afterDraw:function(chart){var ctx=chart.ctx,w=chart.width/2,ht=chart.height/2;ctx.save();ctx.textAlign='center';ctx.fillStyle='#e6edf3';ctx.font='bold 20px -apple-system,sans-serif';ctx.fillText(enf+'/'+(enf+unenf),w,ht);ctx.font='11px -apple-system,sans-serif';ctx.fillStyle='#8b949e';ctx.fillText('PSS',w,ht+14);ctx.restore()}}]});
    }
  }};
}

// === FINDINGS PAGE ===
async function renderFindings(){
  renderBar('<span class="btn btn-ac" onclick="exportFindings()">Export CSV</span>');
  var scans=await api('/scans?limit=1');
  if(!scans||!scans.length)return '<div class="empty">No scans.</div>';
  var rpt=await api('/scans/'+scans[0].id+'/report');
  window._findings=rpt.findings||[];
  var all=window._findings;
  var h='<h2>Findings</h2>';

  // Summary counts.
  var critN=all.filter(function(f){return f.severity==='critical'}).length;
  var warnN=all.filter(function(f){return f.severity==='warning'}).length;
  var infoN=all.filter(function(f){return f.severity==='info'}).length;
  h+='<p class="sub">'+all.length+' findings: <span style="color:var(--cr);font-weight:600">'+critN+' critical</span>, <span style="color:var(--wn);font-weight:600">'+warnN+' warning</span>, <span style="color:var(--ac)">'+infoN+' info</span></p>';

  h+='<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">';
  h+='<input type="search" id="fSearch" placeholder="Filter findings..." style="background:var(--c2);border:1px solid var(--bd);border-radius:5px;padding:4px 10px;color:var(--tx);font-size:12px;width:200px">';
  h+='<select id="fSev" style="background:var(--c2);border:1px solid var(--bd);border-radius:5px;padding:4px 8px;color:var(--tx);font-size:11px"><option value="">All severities</option><option value="critical">Critical</option><option value="warning">Warning</option><option value="info">Info</option></select>';
  h+='<select id="fCluster" style="background:var(--c2);border:1px solid var(--bd);border-radius:5px;padding:4px 8px;color:var(--tx);font-size:11px"><option value="">All clusters</option>';
  var clusterSet={};all.forEach(function(f){clusterSet[f.cluster]=1});
  Object.keys(clusterSet).sort().forEach(function(c){h+='<option value="'+esc(c)+'">'+esc(c)+'</option>'});
  h+='</select>';
  h+='</div>';

  if(!all.length)return h+'<div class="empty">No findings. Fleet is healthy.</div>';

  // Group by cluster.
  var groups={};
  all.forEach(function(f){
    var k=f.cluster||'fleet';
    if(!groups[k])groups[k]=[];
    groups[k].push(f);
  });

  // Sort cluster keys: fleet first, then by critical count descending.
  var keys=Object.keys(groups).sort(function(a,b){
    if(a==='fleet')return -1;if(b==='fleet')return 1;
    var ac=groups[a].filter(function(f){return f.severity==='critical'}).length;
    var bc=groups[b].filter(function(f){return f.severity==='critical'}).length;
    return bc-ac;
  });

  keys.forEach(function(cluster){
    var findings=groups[cluster];
    var gc=findings.filter(function(f){return f.severity==='critical'}).length;
    var gw=findings.filter(function(f){return f.severity==='warning'}).length;

    var statusColor=gc?'var(--cr)':gw?'var(--wn)':'var(--ok)';
    var isFleet=cluster==='fleet';

    h+='<div class="finding-group" data-gcluster="'+esc(cluster)+'" style="margin-bottom:16px">';
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bd)">';
    h+='<span style="width:10px;height:10px;border-radius:50%;background:'+statusColor+';flex-shrink:0"></span>';
    if(isFleet){
      h+='<span style="font-size:14px;font-weight:600;color:var(--tx)">Fleet-wide</span>';
    }else{
      h+='<a style="font-size:14px;font-weight:600;color:var(--ac);cursor:pointer" onclick="nav(\'detail\',{cluster:\''+esc(cluster)+'\'})">'+esc(cluster)+'</a>';
    }
    h+='<span style="font-size:11px;color:var(--t2)">'+findings.length+' finding'+(findings.length!==1?'s':'');
    if(gc)h+=' &middot; <span style="color:var(--cr)">'+gc+' critical</span>';
    if(gw)h+=' &middot; <span style="color:var(--wn)">'+gw+' warning</span>';
    h+='</span>';
    h+='</div>';
    findings.forEach(function(f){h+=renderFinding(f)});
    h+='</div>';
  });

  return {html:h,post:function(){
    var s=document.getElementById('fSearch'),sv=document.getElementById('fSev'),sc=document.getElementById('fCluster');
    function apply(){
      var q=(s?s.value:'').toLowerCase(),sev=sv?sv.value:'',cl=sc?sc.value:'';
      // Filter individual findings.
      document.querySelectorAll('.fi').forEach(function(el){
        var show=true;
        if(sev&&el.dataset.sev!==sev)show=false;
        if(cl&&el.dataset.cluster!==cl)show=false;
        if(q&&el.dataset.text.indexOf(q)<0)show=false;
        el.style.display=show?'':'none';
      });
      // Hide group headers if all findings in the group are hidden.
      document.querySelectorAll('.finding-group').forEach(function(g){
        var visible=g.querySelectorAll('.fi:not([style*="display: none"])');
        g.style.display=visible.length?'':'none';
      });
    }
    if(s)s.oninput=apply;
    if(sv)sv.onchange=apply;
    if(sc)sc.onchange=apply;
  }};
}

async function renderAlerts(){

  var resp;
  try{resp=await api('/alerts?limit=200')}catch(e){return '<div class="loading">Alerts unavailable: '+e.message+'</div>'}
  window._alerts=(resp&&resp.alerts)||[];
  var h='<h2 style="margin:14px 20px 6px;font-size:16px">Inbound alerts</h2>';
  h+='<div style="margin:0 20px 12px;color:var(--t2);font-size:12px">Live runtime alerts ingested from AlertManager and Falco. Filter, then double-click a row to see the full label set.</div>';
  h+='<div class="tw" style="margin:0 20px"><table id="alertsTable"><thead><tr><th>When</th><th>Severity</th><th>Source</th><th>Cluster</th><th>Alert</th><th>Summary</th><th></th></tr></thead><tbody id="alertsBody"></tbody></table></div>';
  setTimeout(filterAlerts,0);
  return h;
}
function filterAlerts(){
  var rows=window._alerts||[];
  var src=document.getElementById('aSrc'); src=src?src.value:'';
  var sev=document.getElementById('aSev'); sev=sev?sev.value:'';
  var tb=document.getElementById('alertsBody');
  if(!tb)return;
  var b='';
  rows.forEach(function(a){
    var labelSource=(a.labels&&a.labels.source)||(a.labels&&a.labels.k8s_cluster_name?'falco':'alertmanager');
    if(src&&labelSource!==src)return;
    if(sev&&a.severity!==sev)return;
    var ts=a.received_at?new Date(a.received_at).toLocaleString():'';
    var sevCls=a.severity==='critical'?'cr':(a.severity==='warning'?'wn':'ok');
    b+='<tr ondblclick=\'window.alert(JSON.stringify('+JSON.stringify(a.labels||{}).replace(/\'/g,"&#39;")+',null,2))\'><td>'+ts+'</td><td class="s-'+sevCls+'">'+(a.severity||'')+'</td><td>'+labelSource+'</td><td>'+(a.cluster||'')+'</td><td>'+(a.alertname||'')+'</td><td>'+escapeHTML(a.summary||'')+'</td><td><button class="btn" onclick="ackAlert(\''+a.fingerprint+'\')">Ack</button></td></tr>';
  });
  if(!b)b='<tr><td colspan="7" style="text-align:center;color:var(--t3);padding:30px">No alerts match the current filters.</td></tr>';
  tb.innerHTML=b;
}
function escapeHTML(s){return String(s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
async function ackAlert(fp){
  var reason=window.prompt('Reason (optional):','')||'';
  try{
    var r=await fetch('/api/alerts/'+encodeURIComponent(fp)+'/ack',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason:reason,ack_by:'dashboard'})});
    if(!r.ok){window.alert('Ack failed: '+r.status+' '+r.statusText);return}
    if(typeof window.render==='function')window.render();
  }catch(e){window.alert('Ack error: '+e.message)}
}

    h+='<div style="font-size:14px;font-weight:600;color:var(--tx)">'+esc(inc.title)+'</div>';

// === CLUSTERS ===
async function renderClusters(){
  renderBar('<span class="btn btn-ac" onclick="exportClustersCSV()">Export CSV</span>');
  var clusters=await api('/clusters');
  var h='<h2>Known clusters</h2>';
  if(!clusters||!clusters.length)return h+'<div class="empty">No clusters scanned yet.</div>';

  // Fetch latest report for health data.
  var scans=await api('/scans?limit=1');
  var healthMap={},rpt=null;
  if(scans&&scans.length){
    rpt=await api('/scans/'+scans[0].id+'/report');
    if(rpt&&rpt.cluster_healths){
      rpt.cluster_healths.forEach(function(ch){healthMap[ch.name]=ch});
    }
  }

  h+='<p class="sub">'+clusters.length+' clusters tracked across '+(rpt?rpt.clusters.length:0)+' in latest scan</p>';

  // Health cards view, worst clusters first and capped so a large fleet stays
  // manageable; the toggle and the search reveal the rest.
  var _stOrder={critical:0,degraded:1,strained:1,busy:2,unknown:3,healthy:4};
  clusters=clusters.slice().sort(function(a,b){
    var sa=(healthMap[a.name]||{}).status||'unknown',sb=(healthMap[b.name]||{}).status||'unknown';
    return (_stOrder[sa]==null?3:_stOrder[sa])-(_stOrder[sb]==null?3:_stOrder[sb]);
  });
  h+='<div class="g g3">';
  clusters.forEach(function(c){
    var ch=healthMap[c.name];
    var color='var(--t3)',status='unknown',bg='rgba(139,148,158,.06)';
    if(ch){
      color=ch.status==='critical'?'var(--cr)':ch.status==='degraded'?'var(--wn)':'var(--ok)';
      bg=ch.status==='critical'?'rgba(248,81,73,.06)':ch.status==='degraded'?'rgba(210,153,34,.06)':'rgba(63,185,80,.04)';
      status=ch.status;
    }
    h+='<div class="cd cc" data-cname="'+esc((c.name||'').toLowerCase())+'" onclick="nav(\'detail\',{cluster:\''+esc(c.name)+'\'})" data-tip="Click for full cluster detail">';
    h+='<div class="ind" style="background:'+color+'"></div>';
    h+='<h4 style="margin-left:6px;margin-bottom:2px">'+esc(c.name)+'</h4>';
    h+='<span class="badge" style="background:'+bg+';color:'+color+';margin-left:6px">'+status+'</span>';
    if(ch){
      h+='<div class="row"><span data-tip="'+esc(TIPS.git_version)+'">Version</span><span class="val">'+esc(ch.kubernetes_version||'N/A')+'</span></div>';
      h+='<div class="row"><span data-tip="'+esc(TIPS.healthy_nodes)+'">Nodes</span><span class="val">'+ch.healthy_nodes+' / '+ch.node_count+' healthy</span></div>';
      h+='<div class="row"><span data-tip="'+esc(TIPS.avg_cpu_percent)+'">CPU</span><span class="val" '+(ch.avg_cpu>85?'style="color:var(--cr)"':ch.avg_cpu>70?'style="color:var(--wn)"':'')+'>'+pct(ch.avg_cpu)+'</span></div>';
      h+='<div class="row"><span data-tip="'+esc(TIPS.avg_memory_percent)+'">Memory</span><span class="val" '+(ch.avg_memory>85?'style="color:var(--cr)"':ch.avg_memory>70?'style="color:var(--wn)"':'')+'>'+pct(ch.avg_memory)+'</span></div>';
      h+='<div class="row"><span data-tip="'+esc(TIPS.warning_events)+'">Warning events</span><span class="val"'+(ch.warning_events>50?' style="color:var(--wn)"':'')+'>'+ch.warning_events+'</span></div>';
      h+='<div class="row"><span>Findings</span><span class="val">'+(ch.finding_counts.critical||0)+' critical, '+(ch.finding_counts.warning||0)+' warn</span></div>';
    }
    h+='<div class="row"><span>Groups</span><span class="val">'+(c.groups&&c.groups.length?c.groups.join(', '):'none')+'</span></div>';
    var tagKeys=c.tags?Object.keys(c.tags).sort():[];
    if(tagKeys.length){
      var chips='';
      tagKeys.forEach(function(k){
        chips+='<span class="tag-chip">'+esc(k)+'='+esc(c.tags[k])+'</span>';
      });
      h+='<div class="row"><span>Tags</span><span class="val tag-chips">'+chips+'</span></div>';
    }
    h+='<div class="row"><span>First seen</span><span class="val mono">'+new Date(c.first_seen).toLocaleDateString()+'</span></div>';
    h+='<div class="row"><span>Last seen</span><span class="val mono">'+new Date(c.last_seen).toLocaleDateString()+'</span></div>';
    h+='</div>';
  });
  h+='</div>';
  h+='<div style="margin:4px 0 2px"><button class="btn" id="cardsToggle" onclick="toggleClusterCards()" style="display:none">Show all</button></div>';

  // Comparison table: only color values that represent actual problems.
  // Counts like node_count and namespace_count are expected to vary and should not be colored.
  // Utilization percentages use threshold colors. Gap counts (unenforced, no-netpol) are colored
  // because they represent missing security posture.
  if(rpt&&rpt.cluster_healths&&rpt.cluster_healths.length>1){

    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:0 0 8px">'+
      '<input id="cSearch" type="search" placeholder="Filter clusters..." oninput="renderClusterTable()" style="flex:1;min-width:160px">'+
      '<select id="cSort" onchange="renderClusterTable()"><option value="status">Sort: Status</option><option value="name">Sort: Name</option><option value="cpu">Sort: CPU</option><option value="mem">Sort: Memory</option><option value="headroom">Sort: Headroom</option><option value="findings">Sort: Findings</option></select>'+
      '<select id="cSize" onchange="window._clusterCmp&&(window._clusterCmp.page=0);renderClusterTable()"><option value="25">25 / page</option><option value="50">50 / page</option><option value="100">100 / page</option><option value="all">All</option></select>'+
      '</div>';
    h+='<div class="tw"><table><thead><tr>'+
      '<th>Cluster</th>'+
      '<th data-tip="Correlated status: healthy, busy, degraded, or critical. Based on utilization + pressure + events, not just percentages.">Status</th>'+

      '<th data-tip="'+esc(TIPS.avg_cpu_percent)+'">CPU</th>'+
      '<th data-tip="'+esc(TIPS.avg_memory_percent)+'">Memory</th>'+
      '<th data-tip="Percentage of memory capacity still unused. Lower headroom means less ability to absorb traffic spikes.">Headroom</th>'+
      '<th data-tip="Active pressure conditions or failure events detected on this cluster">Signals</th>'+
      '<th data-tip="Namespaces missing PSS enforce labels. A security gap, not expected to vary.">PSS gaps</th>'+
      '<th data-tip="Namespaces with no NetworkPolicy. A security gap, not expected to vary.">NetPol gaps</th>'+
      '<th data-tip="Number of critical and warning findings for this cluster">Findings</th>'+
      '</tr></thead><tbody id="clusterCmpBody"></tbody></table></div>';
    h+='<div id="clusterPager" style="display:flex;align-items:center;gap:10px;margin-top:8px;font-size:12px;color:var(--t2)"></div>';
    window._clusterCmp={page:0};
    setTimeout(renderClusterTable,0);
  }

  window._clustersData={clusters:clusters,healthMap:healthMap,rpt:rpt};
  return h;
}

// renderClusterTable filters, sorts, and paginates the cluster comparison table
// from window._clustersData so large fleets stay navigable. Reads the search,
// sort, and page-size controls and rewrites the table body plus a pager.
function renderClusterTable(){
  var d=window._clustersData,st=window._clusterCmp;
  if(!d||!d.rpt||!d.rpt.cluster_healths||!st)return;
  var rpt=d.rpt;
  var capMap={};if(rpt.capacity){rpt.capacity.forEach(function(ca){capMap[ca.cluster]=ca})}
  var secU=(rpt.sections&&rpt.sections.security&&rpt.sections.security.per_cluster)||{};
  var secN=(rpt.sections&&rpt.sections['network-policies']&&rpt.sections['network-policies'].per_cluster)||{};
  var stRank={critical:0,degraded:1,strained:1,busy:2,healthy:3};
  var rows=rpt.cluster_healths.map(function(ch){
    var ca=capMap[ch.name]||{};
    var status=ca.status||ch.status;
    var signals=[];
    if(ca.has_memory_pressure)signals.push('MemPressure');
    if(ca.has_oom_events)signals.push('OOMKill');
    if(ca.has_scheduling_failures)signals.push('SchedFail');
    if(ca.has_disk_pressure)signals.push('DiskPressure');
    return {name:ch.name,status:status,ver:ch.kubernetes_version||'N/A',nodes:ch.node_count,
      cpu:ch.avg_cpu,mem:ch.avg_memory,headroom:ca.headroom_memory,rec:ca.recommendation||'',signals:signals,
      unenforced:(secU[ch.name]||{}).unenforced_count||0,npGaps:(secN[ch.name]||{}).namespaces_without_policies||0,
      crit:(ch.finding_counts||{}).critical||0,warn:(ch.finding_counts||{}).warning||0,
      rank:stRank[status]!=null?stRank[status]:3};
  });
  var q=(((document.getElementById('cSearch')||{}).value)||'').toLowerCase();
  if(q)rows=rows.filter(function(r){return r.name.toLowerCase().indexOf(q)>=0||(r.status||'').toLowerCase().indexOf(q)>=0});
  var sort=((document.getElementById('cSort')||{}).value)||'status';
  rows.sort(function(a,b){
    switch(sort){
      case 'name':return a.name<b.name?-1:a.name>b.name?1:0;
      case 'cpu':return b.cpu-a.cpu;
      case 'mem':return b.mem-a.mem;
      case 'headroom':return (a.headroom==null?999:a.headroom)-(b.headroom==null?999:b.headroom);
      case 'findings':return (b.crit*10+b.warn)-(a.crit*10+a.warn);
      default:return (a.rank-b.rank)||((b.crit*10+b.warn)-(a.crit*10+a.warn));
    }
  });
  var size=((document.getElementById('cSize')||{}).value)||'25';
  var per=size==='all'?(rows.length||1):parseInt(size,10);
  var pages=Math.max(1,Math.ceil(rows.length/per));
  if(st.page>=pages)st.page=pages-1;if(st.page<0)st.page=0;
  var pageRows=rows.slice(st.page*per,st.page*per+per);
  var tb=document.getElementById('clusterCmpBody');if(!tb)return;
  tb.innerHTML=pageRows.length?pageRows.map(clusterRowHTML).join(''):'<tr><td colspan="11" style="text-align:center;color:var(--t3);padding:24px">No clusters match the filter.</td></tr>';
  var pg=document.getElementById('clusterPager');
  if(pg){
    pg.innerHTML='<span>'+rows.length+' clusters</span>'+(pages>1?
      '<button class="btn" '+(st.page<=0?'disabled':'')+' onclick="clusterPage(-1)">Prev</button>'+
      '<span>Page '+(st.page+1)+' / '+pages+'</span>'+
      '<button class="btn" '+(st.page>=pages-1?'disabled':'')+' onclick="clusterPage(1)">Next</button>':'');
  }
  filterClusterCards(q);
}

// clusterPage steps the comparison table pager and re-renders.
function clusterPage(delta){var s=window._clusterCmp;if(!s)return;s.page+=delta;renderClusterTable();}

// clusterRowHTML renders one comparison-table row from a precomputed record.
function clusterRowHTML(r){
  var stColor=r.status==='critical'?'var(--cr)':(r.status==='degraded'||r.status==='strained')?'var(--wn)':r.status==='busy'?'var(--ac)':'var(--ok)';
  var hrColor=r.headroom<15?'var(--cr)':r.headroom<30?'var(--wn)':'var(--ok)';
  var hr=r.headroom!=null?pct(r.headroom):'N/A';
  return '<tr>'+
    '<td style="font-weight:500"><a onclick="nav(\'detail\',{cluster:\''+esc(r.name)+'\'})">'+esc(r.name)+'</a></td>'+
    '<td style="color:'+stColor+';font-weight:600" data-tip="'+esc(r.rec)+'">'+esc(r.status)+'</td>'+
    '<td class="mono">'+esc(r.ver)+'</td>'+
    '<td class="mono">'+r.nodes+'</td>'+
    '<td class="mono" style="color:'+threshColor(r.cpu)+'">'+pct(r.cpu)+'</td>'+
    '<td class="mono" style="color:'+threshColor(r.mem)+'">'+pct(r.mem)+'</td>'+
    '<td class="mono" style="color:'+hrColor+'">'+hr+'</td>'+
    '<td style="font-size:11px">'+(r.signals.length?'<span style="color:var(--cr)">'+r.signals.join(', ')+'</span>':'<span style="color:var(--ok)">clean</span>')+'</td>'+
    '<td class="mono"'+(r.unenforced>0?' style="color:var(--wn)"':'')+'>'+r.unenforced+'</td>'+
    '<td class="mono"'+(r.npGaps>0?' style="color:var(--wn)"':'')+'>'+r.npGaps+'</td>'+
    '<td class="mono">'+(r.crit?'<span style="color:var(--cr)">'+r.crit+'c</span>':'0c')+' / '+(r.warn?'<span style="color:var(--wn)">'+r.warn+'w</span>':'0w')+'</td>'+
    '</tr>';
}

// filterClusterCards hides cluster health cards that do not match the search
// and caps how many show so a large fleet does not flood the page. The toggle
// and an active search both reveal the full set.
function filterClusterCards(q){
  var cards=document.querySelectorAll('.cd.cc[data-cname]');
  var limit=12,showAll=window._clusterCardsAll,shown=0;
  for(var i=0;i<cards.length;i++){
    var n=cards[i].getAttribute('data-cname')||'';
    var match=(!q||n.indexOf(q)>=0);
    var vis=match&&(showAll||!!q||shown<limit);
    cards[i].style.display=vis?'':'none';
    if(vis)shown++;
  }
  var btn=document.getElementById('cardsToggle');
  if(btn){
    btn.style.display=(q||cards.length<=limit)?'none':'';
    btn.textContent=showAll?'Show fewer':'Show all '+cards.length;
  }
}

// toggleClusterCards flips between the capped and full cluster card view.
window.toggleClusterCards=function(){
  window._clusterCardsAll=!window._clusterCardsAll;
  filterClusterCards((((document.getElementById('cSearch')||{}).value)||'').toLowerCase());
};

window.exportClustersCSV=function(){
  var d=window._clustersData;if(!d)return;
  var rows=[];
  d.clusters.forEach(function(c){
    var ch=d.healthMap[c.name]||{};
    rows.push([c.name,ch.status||'unknown',ch.kubernetes_version||'',ch.node_count||0,ch.healthy_nodes||0,
      ch.avg_cpu?Math.round(ch.avg_cpu):'',ch.avg_memory?Math.round(ch.avg_memory):'',
      ch.warning_events||0,(ch.finding_counts||{}).critical||0,(ch.finding_counts||{}).warning||0,
      (c.groups||[]).join(';'),c.first_seen,c.last_seen]);
  });
  csvExport('fleetsweeper-clusters.csv',['Cluster','Status','Version','Nodes','Healthy','CPU%','Mem%','Warnings','Critical','Warnings','Groups','First Seen','Last Seen'],rows);
};

// === Drift replay: scrub findings across recent scans ===
async function renderReplay(){
  renderBar('');
  var tl,pers;

  }catch(e){return '<div class="empty">Error loading replay: '+esc(e.message)+'</div>';}

  }
  var sets=pts.map(function(p){var m={};(p.findings||[]).forEach(function(f){m[f.fingerprint]=f});return m;});

    +'<p style="color:var(--t2);font-size:13px;margin:0 0 10px">Scrub through recent scans to watch findings appear and resolve across the fleet. Press Play to step forward in time. The chronic panel ranks findings by how persistently they recur, an implicit signal of what is a standing problem versus a passing blip.</p>'
    +'<div style="height:110px"><canvas id="replayChart"></canvas></div>'
    +'<div style="display:flex;align-items:center;gap:10px;margin:12px 0 8px;flex-wrap:wrap">'

    +'<span id="replayStamp" class="mono" style="font-size:12px;color:var(--t2)"></span>'
    +'</div>'

    +'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
