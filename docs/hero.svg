<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <!-- Animated README hero. Mirrors the in-app cinematic: the fleet populates,
       a scan sweep crosses it, prod-east flags red and ripples, the Fleet Score
       arc draws to 73, and the findings stream in. Pure CSS animation so it runs
       inside an <img>-embedded SVG on GitHub. Resting state is the final frame,
       so prefers-reduced-motion collapses cleanly to a static hero. -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#11161d"/>
      <stop offset="70%" stop-color="#0d1117"/>
    </radialGradient>
    <linearGradient id="sweepGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="fleetClip">
      <rect x="40" y="96" width="580" height="300" rx="8"/>
    </clipPath>
    <style>
      @keyframes fadein { from { opacity: 0 } to { opacity: 1 } }
      @keyframes flip { from { fill: #3fb950 } to { fill: #f85149 } }
      @keyframes pulse {
        0%   { opacity: 0.65; transform: scale(0.55) }
        80%  { opacity: 0 }
        100% { opacity: 0; transform: scale(3.4) }
      }
      @keyframes draw {
        from { stroke-dashoffset: 490.09 }
        to   { stroke-dashoffset: 132.32 }
      }
      @keyframes pop {
        from { opacity: 0; transform: scale(0.5) }
        to   { opacity: 1; transform: scale(1) }
      }
      @keyframes chipin {
        from { opacity: 0; transform: translateX(-8px) }
        to   { opacity: 1; transform: translateX(0) }
      }
      @keyframes glow { 0%, 100% { opacity: 0.12 } 50% { opacity: 0.30 } }
      @keyframes sweep {
        0%   { opacity: 0; transform: translateX(-160px) }
        8%   { opacity: 1 }
        88%  { opacity: 1 }
        100% { opacity: 0; transform: translateX(600px) }
      }

      .cl    { animation: fadein 0.5s ease-out both }
      .fade2 { animation: fadein 0.6s ease-out both }
      .core  { animation: flip 0.5s ease-out 2.2s both }
      .pulse {
        opacity: 0;
        transform-box: fill-box;
        transform-origin: center;
        animation: pulse 1.8s ease-out infinite;
      }
      .arc      { animation: draw 1.4s ease-out 2.6s both }
      .score {
        transform-box: fill-box;
        transform-origin: center;
        animation: pop 0.6s cubic-bezier(0.2, 1.3, 0.4, 1) 3.05s both;
      }
      .chip  { animation: chipin 0.6s ease-out both }
      .glow  { animation: glow 2.6s ease-in-out infinite }
      .sweep { opacity: 0; animation: sweep 5.5s linear 1s infinite }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="440" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="439" rx="16" fill="none" stroke="#30363d"/>

  <!-- Header -->
  <circle class="glow" cx="44" cy="44" r="12" fill="#58a6ff" opacity="0.18"/>
  <circle cx="44" cy="44" r="6" fill="#58a6ff"/>
  <text x="64" y="53" fill="#f0f6fc" font-size="27" font-weight="700" letter-spacing="-0.3">Fleetsweeper</text>
  <text x="252" y="53" fill="#8b949e" font-size="16">the fleet is the policy</text>
  <text x="1160" y="50" fill="#8b949e" font-size="13" text-anchor="end" font-family="'SF Mono','JetBrains Mono',monospace">26 clusters · 1 outlier</text>
  <line x1="40" y1="76" x2="1160" y2="76" stroke="#30363d"/>

  <!-- Left panel: the fleet -->
  <text x="48" y="112" fill="#8b949e" font-size="13" font-weight="600" letter-spacing="1.5" font-family="'SF Mono','JetBrains Mono',monospace">YOUR FLEET</text>

  <g>
    <g class="cl" style="animation-delay:0.00s" transform="translate(110,168)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
    <g class="cl" style="animation-delay:0.05s" transform="translate(228,168)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
    <g class="cl" style="animation-delay:0.10s" transform="translate(346,168)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
    <g class="cl" style="animation-delay:0.15s" transform="translate(464,168)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
    <g class="cl" style="animation-delay:0.20s" transform="translate(582,168)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>

    <g class="cl" style="animation-delay:0.25s" transform="translate(110,252)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
    <g class="cl" style="animation-delay:0.30s" transform="translate(228,252)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
    <g class="cl" style="animation-delay:0.35s" transform="translate(346,252)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
    <g class="cl" style="animation-delay:0.40s" transform="translate(582,252)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>

    <g class="cl" style="animation-delay:0.45s" transform="translate(110,336)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
    <g class="cl" style="animation-delay:0.50s" transform="translate(228,336)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
    <g class="cl" style="animation-delay:0.55s" transform="translate(346,336)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
    <g class="cl" style="animation-delay:0.60s" transform="translate(464,336)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
    <g class="cl" style="animation-delay:0.65s" transform="translate(582,336)"><circle r="18" fill="none" stroke="#3fb950" stroke-opacity="0.16" stroke-width="6"/><circle r="13" fill="#3fb950"/></g>
  </g>

  <!-- The outlier -->
  <g class="cl" style="animation-delay:0.40s" transform="translate(464,252)">
    <circle class="pulse" style="animation-delay:2.2s" r="15" fill="none" stroke="#f85149" stroke-width="2" vector-effect="non-scaling-stroke"/>
    <circle class="pulse" style="animation-delay:2.8s" r="15" fill="none" stroke="#f85149" stroke-width="2" vector-effect="non-scaling-stroke"/>
    <circle class="pulse" style="animation-delay:3.4s" r="15" fill="none" stroke="#f85149" stroke-width="2" vector-effect="non-scaling-stroke"/>
    <circle r="18" fill="none" stroke="#f85149" stroke-opacity="0.5" stroke-width="2"/>
    <circle class="core" r="15" fill="#f85149"/>
    <text class="fade2" style="animation-delay:2.6s" x="0" y="-30" text-anchor="middle" fill="#f85149" font-size="11" font-family="'SF Mono','JetBrains Mono',monospace">z = 3.6</text>
    <text class="fade2" style="animation-delay:2.5s" x="0" y="46" text-anchor="middle" fill="#f85149" font-size="13" font-weight="600" font-family="'SF Mono','JetBrains Mono',monospace">prod-east</text>
  </g>

  <!-- Scan sweep -->
  <g clip-path="url(#fleetClip)">
    <rect class="sweep" x="40" y="96" width="150" height="300" fill="url(#sweepGrad)"/>
  </g>

  <!-- Right panel: fleet score -->
  <text x="930" y="100" fill="#8b949e" font-size="13" font-weight="600" letter-spacing="1.5" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace">FLEET SCORE</text>
  <circle cx="930" cy="200" r="78" fill="none" stroke="#30363d" stroke-width="13"/>
  <circle class="arc" cx="930" cy="200" r="78" fill="none" stroke="#58a6ff" stroke-width="13" stroke-linecap="round" stroke-dasharray="490.09" stroke-dashoffset="132.32" transform="rotate(-90 930 200)"/>
  <text class="score" x="930" y="216" fill="#f0f6fc" font-size="58" font-weight="700" text-anchor="middle" font-family="'SF Mono','JetBrains Mono',monospace">73</text>
  <text class="fade2" style="animation-delay:3.3s" x="930" y="242" fill="#8b949e" font-size="15" text-anchor="middle">grade C</text>

  <!-- Finding chips -->
  <g class="chip" style="animation-delay:3.40s">
    <rect x="798" y="289" width="10" height="14" rx="2" fill="#f85149"/>
    <text x="816" y="300" fill="#c9d1d9" font-size="13" font-family="'SF Mono','JetBrains Mono',monospace">prod-east · 5 nodes NotReady</text>
  </g>
  <g class="chip" style="animation-delay:3.55s">
    <rect x="798" y="321" width="10" height="14" rx="2" fill="#d29922"/>
    <text x="816" y="332" fill="#c9d1d9" font-size="13" font-family="'SF Mono','JetBrains Mono',monospace">fleet · v1.28 vs v1.30 version skew</text>
  </g>
  <g class="chip" style="animation-delay:3.70s">
    <rect x="798" y="353" width="10" height="14" rx="2" fill="#d29922"/>
    <text x="816" y="364" fill="#c9d1d9" font-size="13" font-family="'SF Mono','JetBrains Mono',monospace">payments · writable root filesystem</text>
  </g>

  <!-- Caption -->
  <text x="600" y="418" fill="#8b949e" font-size="14.5" text-anchor="middle">Modified z-score across your own clusters. No rulebook. It names the one that wandered off.</text>
</svg>
