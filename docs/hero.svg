<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#11161d"/>
      <stop offset="70%" stop-color="#0d1117"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="440" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="439" rx="16" fill="none" stroke="#30363d"/>

  <!-- Header -->
  <circle cx="44" cy="44" r="12" fill="#58a6ff" opacity="0.18"/>
  <circle cx="44" cy="44" r="6" fill="#58a6ff"/>
  <text x="64" y="52" fill="#f0f6fc" font-size="27" font-weight="700" letter-spacing="-0.3">Fleetsweeper</text>
  <text x="248" y="52" fill="#8b949e" font-size="16">the fleet is the policy</text>
  <line x1="40" y1="76" x2="1160" y2="76" stroke="#30363d"/>

  <!-- Left panel: the fleet -->
  <text x="48" y="112" fill="#8b949e" font-size="13" font-weight="600" letter-spacing="1.5" font-family="SF Mono,JetBrains Mono,monospace">YOUR FLEET</text>

  <!-- healthy clusters -->
  <g>
    <circle cx="120" cy="165" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="120" cy="165" r="15" fill="#3fb950"/>
    <circle cx="235" cy="165" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="235" cy="165" r="15" fill="#3fb950"/>
    <circle cx="350" cy="165" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="350" cy="165" r="15" fill="#3fb950"/>
    <circle cx="465" cy="165" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="465" cy="165" r="15" fill="#3fb950"/>
    <circle cx="580" cy="165" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="580" cy="165" r="15" fill="#3fb950"/>

    <circle cx="120" cy="250" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="120" cy="250" r="15" fill="#3fb950"/>
    <circle cx="235" cy="250" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="235" cy="250" r="15" fill="#3fb950"/>
    <circle cx="350" cy="250" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="350" cy="250" r="15" fill="#3fb950"/>
    <circle cx="580" cy="250" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="580" cy="250" r="15" fill="#3fb950"/>

    <circle cx="120" cy="335" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="120" cy="335" r="15" fill="#3fb950"/>
    <circle cx="235" cy="335" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="235" cy="335" r="15" fill="#3fb950"/>
    <circle cx="350" cy="335" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="350" cy="335" r="15" fill="#3fb950"/>
    <circle cx="465" cy="335" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="465" cy="335" r="15" fill="#3fb950"/>
    <circle cx="580" cy="335" r="17" fill="none" stroke="#3fb950" stroke-opacity="0.22" stroke-width="7"/><circle cx="580" cy="335" r="15" fill="#3fb950"/>
  </g>

  <!-- the outlier -->
  <circle cx="465" cy="250" r="33" fill="none" stroke="#f85149" stroke-opacity="0.25" stroke-width="2"/>
  <circle cx="465" cy="250" r="26" fill="none" stroke="#f85149" stroke-opacity="0.5" stroke-width="2"/>
  <circle cx="465" cy="250" r="18" fill="#f85149"/>
  <text x="465" y="308" fill="#f85149" font-size="12.5" font-weight="600" text-anchor="middle" font-family="SF Mono,JetBrains Mono,monospace">prod-east</text>

  <!-- Right panel: fleet score -->
  <text x="915" y="112" fill="#8b949e" font-size="13" font-weight="600" letter-spacing="1.5" text-anchor="middle" font-family="SF Mono,JetBrains Mono,monospace">FLEET SCORE</text>
  <circle cx="915" cy="205" r="80" fill="none" stroke="#30363d" stroke-width="14"/>
  <circle cx="915" cy="205" r="80" fill="none" stroke="#58a6ff" stroke-width="14" stroke-linecap="round" stroke-dasharray="502.65" stroke-dashoffset="135.7" transform="rotate(-90 915 205)"/>
  <text x="915" y="222" fill="#f0f6fc" font-size="60" font-weight="700" text-anchor="middle" font-family="SF Mono,JetBrains Mono,monospace">73</text>
  <text x="915" y="252" fill="#8b949e" font-size="15" text-anchor="middle">grade C</text>

  <!-- finding chips -->
  <rect x="722" y="300" width="10" height="14" rx="2" fill="#f85149"/>
  <text x="742" y="312" fill="#c9d1d9" font-size="13.5" font-family="SF Mono,JetBrains Mono,monospace">prod-east · 5 nodes NotReady</text>
  <rect x="722" y="330" width="10" height="14" rx="2" fill="#d29922"/>
  <text x="742" y="342" fill="#c9d1d9" font-size="13.5" font-family="SF Mono,JetBrains Mono,monospace">fleet · v1.28 vs v1.30 version skew</text>
  <rect x="722" y="360" width="10" height="14" rx="2" fill="#d29922"/>
  <text x="742" y="372" fill="#c9d1d9" font-size="13.5" font-family="SF Mono,JetBrains Mono,monospace">payments · writable root filesystem</text>

  <!-- Caption -->
  <text x="600" y="418" fill="#8b949e" font-size="14.5" text-anchor="middle">Modified z-score across your own clusters. No rulebook. It names the one that wandered off.</text>
